<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 AI Mystery Theater</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-card: #13131a;
  --bg-card-hover: #1a1a24;
  --gold: #FFD700;
  --gold-dim: #b8960f;
  --amber: #d4a017;
  --text: #e8e0d4;
  --text-dim: #8a8278;
  --border: #2a2520;
  --detective: #FFD700;
  --suspect1: #E74C3C;
  --suspect2: #3498DB;
  --suspect3: #2ECC71;
  --suspect4: #9B59B6;
  --suspect5: #E67E22;
  --narrator: #95A5A6;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 100%, rgba(139,69,19,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 3rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 3rem;
}

.header-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.4em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.story-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 900;
  color: var(--gold);
  line-height: 1.15;
  margin-bottom: 1rem;
  text-shadow: 0 0 40px rgba(255,215,0,0.15);
}

.setting {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--text-dim);
  font-size: 1.05rem;
  max-width: 600px;
  margin: 0 auto 2rem;
}

/* Cast */
.cast {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  justify-content: center;
  margin-top: 1.5rem;
}

.cast-member {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0.35rem 0.85rem;
  font-size: 0.8rem;
}

.cast-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.7rem;
  color: #000;
  flex-shrink: 0;
}

.cast-name { font-weight: 600; }
.cast-model {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
}

/* Act headings */
.act-heading {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  margin: 3.5rem 0 1.5rem;
  position: relative;
}

.act-heading::before,
.act-heading::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 60px;
  height: 1px;
  background: var(--border);
}
.act-heading::before { right: calc(100% + 12px); }
.act-heading::after { left: calc(100% + 12px); }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.25rem;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
}

.card-speaker {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  margin-bottom: 0.75rem;
}

.speaker-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: #000;
  flex-shrink: 0;
}

.speaker-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 1.05rem;
}

.speaker-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
}

.card-text {
  white-space: pre-wrap;
  font-size: 0.95rem;
  line-height: 1.75;
}

.card-text em, .card-text i {
  color: var(--text-dim);
  font-style: italic;
}

/* Narrator / Scene card */
.card-narrator {
  border-color: rgba(149,165,166,0.3);
  background: linear-gradient(135deg, var(--bg-card) 0%, #141418 100%);
}

.card-narrator .card-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #c0b8a8;
}

/* Detective card */
.card-detective {
  border-left: 3px solid var(--detective);
}

/* Evidence card */
.card-evidence {
  border: 1px solid rgba(231,76,60,0.5);
  background: linear-gradient(135deg, #1a1015 0%, var(--bg-card) 100%);
  position: relative;
  overflow: hidden;
}

.card-evidence::before {
  content: '🔍 EVIDENCE';
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: #E74C3C;
  position: absolute;
  top: 0.75rem;
  right: 1rem;
}

.card-evidence.visible {
  animation: evidenceFlash 0.6s ease;
}

@keyframes evidenceFlash {
  0% { box-shadow: 0 0 0 rgba(231,76,60,0); }
  30% { box-shadow: 0 0 30px rgba(231,76,60,0.3); }
  100% { box-shadow: 0 0 0 rgba(231,76,60,0); }
}

/* Reveal */
.reveal-card {
  text-align: center;
  padding: 2.5rem;
  margin: 2rem 0;
  border-radius: 16px;
  border: 2px solid;
}

.reveal-correct {
  border-color: rgba(46,204,113,0.6);
  background: linear-gradient(135deg, #0a1a10 0%, var(--bg-card) 100%);
}

.reveal-wrong {
  border-color: rgba(231,76,60,0.6);
  background: linear-gradient(135deg, #1a0a0a 0%, var(--bg-card) 100%);
}

.reveal-card.visible {
  animation: revealGlow 2s ease infinite;
}

.reveal-correct.visible {
  animation: revealGlowGreen 2s ease infinite;
}

.reveal-wrong.visible {
  animation: revealGlowRed 2s ease infinite;
}

@keyframes revealGlowGreen {
  0%, 100% { box-shadow: 0 0 20px rgba(46,204,113,0.1); }
  50% { box-shadow: 0 0 40px rgba(46,204,113,0.25); }
}

@keyframes revealGlowRed {
  0%, 100% { box-shadow: 0 0 20px rgba(231,76,60,0.1); }
  50% { box-shadow: 0 0 40px rgba(231,76,60,0.25); }
}

.reveal-result {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 900;
  margin-bottom: 1rem;
}

.reveal-correct .reveal-result { color: #2ECC71; }
.reveal-wrong .reveal-result { color: #E74C3C; }

.reveal-solution {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--text-dim);
  line-height: 1.7;
  max-width: 600px;
  margin: 0 auto;
}

/* Parlor scene */
.card-parlor {
  border: 1px solid rgba(255,215,0,0.3);
  background: linear-gradient(135deg, #14120a 0%, var(--bg-card) 100%);
  padding: 2rem;
}

/* Footer */
.footer {
  text-align: center;
  padding: 3rem 0 2rem;
  margin-top: 3rem;
  border-top: 1px solid var(--border);
}

.footer-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}

.footer-brand {
  font-family: 'Playfair Display', serif;
  font-size: 0.85rem;
  color: var(--gold-dim);
}

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 1rem; }
  .header { padding: 2rem 0 1.5rem; }
  .card { padding: 1.15rem; }
  .act-heading::before, .act-heading::after { width: 30px; }
  .cast { gap: 0.5rem; }
}
</style>
</head>

<script id="transcript-data" type="application/json">{"title": "Murder at Thornfield Manor", "date": "2026-02-16_103716", "detective_model": "anthropic/claude-sonnet-4", "suspect_models": {"Lady Margaret Thornfield": "openai/gpt-4o", "Captain James Ashworth": "google/gemini-2.0-flash-001", "Dr. Harold Pembrooke": "meta-llama/llama-3.3-70b-instruct", "Miss Victoria Thornfield": "mistralai/mistral-large-2411", "Mr. Reginald Cross": "deepseek/deepseek-chat"}, "total_tokens": 38448, "transcript": [{"timestamp": "2026-02-16T10:34:50.692574", "phase": "scene_setting", "speaker": "narrator", "text": "Lord Edmund Thornfield found dead in his locked study at 11:15 PM. A glass of brandy on his desk, half-finished. A letter opener on the floor with blood. The window was latched from inside. A faint smell of almonds in the air. His pocket watch stopped at 10:47 PM.", "model": ""}, {"timestamp": "2026-02-16T10:34:52.885184", "phase": "initial_statements", "speaker": "Lady Margaret Thornfield", "text": "I am Lady Margaret Thornfield, the wife of the late Lord Edmund Thornfield. We have been married for five years. This evening, I was in the drawing room from ten o'clock, reading. The butler can vouch for my presence at the beginning and end of the hour, but I was there throughout, uninterrupted.", "model": "openai/gpt-4o"}, {"timestamp": "2026-02-16T10:34:55.673962", "phase": "initial_statements", "speaker": "Captain James Ashworth", "text": "Right then. I'm Captain James Ashworth, a friend of the family. I've known the Thornfields for years, fought alongside Edmund's son, God rest his soul. This evening, I spent most of my time in the billiard room. A bit of a solitary game to relax, you see.\n", "model": "google/gemini-2.0-flash-001"}, {"timestamp": "2026-02-16T10:35:00.612633", "phase": "initial_statements", "speaker": "Dr. Harold Pembrooke", "text": "Good evening, Detective. I'm Dr. Harold Pembrooke, the family physician and a dear friend of the late Lord Edmund Thornfield. I've had the pleasure of attending to his health for nigh on 20 years. This evening, I was in the library, engrossed in some medical journals from 9:30 onwards, taking a brief moment to visit the study at 9:45 to leave Lord Edmund's heart medication, but I didn't see him there, I assure you.", "model": "meta-llama/llama-3.3-70b-instruct"}, {"timestamp": "2026-02-16T10:35:06.708562", "phase": "initial_statements", "speaker": "Miss Victoria Thornfield", "text": "Good evening, detective. I am Victoria Thornfield, Edmund's daughter from his first marriage. I live in London now, but I returned to Thornfield Manor this evening to discuss a personal matter with my father. I'm afraid we had a bitter argument during the dinner party. I retired to my room at half past nine, feeling quite distraught. I assure you, I stayed in my room for the remainder of the evening. Our housemaid, Mabel, brought me tea around 10 o'clock and can vouch for my whereabouts and my distress.", "model": "mistralai/mistral-large-2411"}, {"timestamp": "2026-02-16T10:35:11.111820", "phase": "initial_statements", "speaker": "Mr. Reginald Cross", "text": "\"I am Reginald Cross, solicitor to the late Lord Thornfield. I arrived this afternoon to handle some legal matters and remained for dinner. After dinner, I retired to the smoking room at approximately 10:00 PM, where I remained until the unfortunate discovery of his lordship's death.\"", "model": "deepseek/deepseek-chat"}, {"timestamp": "2026-02-16T10:35:16.688037", "phase": "interrogation_r1", "speaker": "detective", "text": "I wish to question **Dr. Harold Pembrooke**.\n\n*adjusts cufflinks and fixes the good doctor with a penetrating stare*\n\nDr. Pembrooke, you mentioned visiting the study at 9:45 to leave Lord Edmund's heart medication, but that he was not there. This is most curious, non? Tell me, mon ami - what exactly was this heart medication, and why did you not simply wait for his lordship to return? Surely a physician of your standing would want to personally ensure proper dosage instructions were understood?", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:35:25.927705", "phase": "interrogation_r1", "speaker": "Dr. Harold Pembrooke", "text": "A astute observation, Detective. The medication in question was merely a routine digitalis prescription, nothing out of the ordinary. I had, in fact, spoken with Lord Edmund earlier in the evening, and he was well aware of the dosage instructions, so I didn't deem it necessary to wait for his return. I simply dropped off the medication and returned to my reading in the library, as I had a few articles I wanted to catch up on before the evening drew to a close.", "model": "meta-llama/llama-3.3-70b-instruct"}, {"timestamp": "2026-02-16T10:35:30.832161", "phase": "interrogation_r1", "speaker": "detective", "text": "I wish to question **Miss Victoria Thornfield**.\n\n*leans forward with keen interest*\n\nMademoiselle Victoria, you mentioned having a \"bitter argument\" with your father during dinner, and that you discussed a \"personal matter.\" In a case of murder, there are no secrets that must remain hidden. What precisely was the nature of this argument that left you so distraught you required tea and consolation from the housemaid?", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:35:35.995452", "phase": "interrogation_r1", "speaker": "Miss Victoria Thornfield", "text": "*looking down, wringing hands* Oh, it was a dreadful to-do, detective. Father had promised me years ago that my late mother's estate, Rosewood Cottage, would always remain in the family. It's a special place, filled with memories of Mother. But recently, I discovered that he intended to sell it. I came here tonight to confront him about it. *pauses,looking pained* He wouldn't listen to reason. I wanted him to stop selling off pieces of Mother's memory. He told me to stop dredging up the sentimental past and live in the present. I'm afraid I lost my temper and we had a terrible row. *looks up with defiance* Are you going to imply now that if I am sentimental about my mother's memory, that makes me a murderer? It is simply not true!", "model": "mistralai/mistral-large-2411"}, {"timestamp": "2026-02-16T10:35:37.567711", "phase": "evidence_reveal", "speaker": "narrator", "text": "The forensic examination reveals the cause of death was NOT the letter opener wound \u2014 it was cyanide poisoning. The wound appears to have been caused by Lord Thornfield grabbing the opener and falling on it during convulsions. The brandy glass contained traces of potassium cyanide.", "model": ""}, {"timestamp": "2026-02-16T10:35:43.696346", "phase": "interrogation_r2", "speaker": "detective", "text": "I wish to question **Dr. Harold Pembrooke**.\n\n*strokes mustache thoughtfully, eyes gleaming with suspicion*\n\nDr. Pembrooke, this revelation of cyanide poisoning is most illuminating, n'est-ce pas? As a physician of twenty years' standing, you would certainly have access to potassium cyanide - it has legitimate medical uses, does it not? And you mentioned leaving digitalis for Lord Edmund... tell me, mon ami, did you happen to notice if his lordship had already poured himself his evening brandy when you visited the study at 9:45?", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:35:50.235514", "phase": "interrogation_r2", "speaker": "Dr. Harold Pembrooke", "text": "*pausing for a moment, clearing his throat* Ah, yes, the cyanide poisoning, a tragic circumstance indeed. As a physician, I do have access to various medications and substances, including potassium cyanide, which is used in certain... ah, medical preparations. *nervously adjusts his glasses* As for the brandy, I didn't notice whether Lord Edmund had poured himself a glass or not, I'm afraid I wasn't paying attention to such details. My sole concern was leaving the medication and ensuring his lordship's health was in order. *leans forward slightly* But I must say, Detective, I find it quite disturbing that you would imply any sort of... connection between my medical practice and this heinous crime. *voice takes on a defensive tone*", "model": "meta-llama/llama-3.3-70b-instruct"}, {"timestamp": "2026-02-16T10:35:56.988898", "phase": "interrogation_r2", "speaker": "detective", "text": "I wish to question **Lady Margaret Thornfield**.\n\n*turns sharply to face the widow, eyes narrowing with calculated intensity*\n\nLady Margaret, you claim to have been in the drawing room from ten o'clock onwards, with the butler vouching for your presence at the beginning and end of the hour. But tell me, madame - during this convenient hour of solitude, did you perhaps take a brief constitutional to visit your husband? And more importantly, what book were you reading that so completely absorbed your attention during such a... shall we say... eventful evening?", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:36:01.392567", "phase": "interrogation_r2", "speaker": "Lady Margaret Thornfield", "text": "Detective, I can assure you that I remained in the drawing room the entire time, absorbed in my reading. The book in question was \"The Age of Innocence\" by Edith Wharton, a rather enthralling tale, if I may say so. Leaving the room to visit Edmund did not cross my mind, as I was quite content in my literary escape. My presence in the drawing room was constant, except for perhaps a restless moment to stretch, but certainly no venture to see my husband.", "model": "openai/gpt-4o"}, {"timestamp": "2026-02-16T10:36:02.965467", "phase": "evidence_reveal", "speaker": "narrator", "text": "The butler's log shows that Dr. Pembrooke requested access to the study at 9:45 PM to 'deliver his lordship's evening heart medication.' He was alone in the study for approximately 3 minutes. Lord Thornfield had not yet retired to the study at that time.", "model": ""}, {"timestamp": "2026-02-16T10:36:08.645597", "phase": "interrogation_r3", "speaker": "detective", "text": "I wish to question **Dr. Harold Pembrooke**.\n\n*rises dramatically, pointing an accusatory finger*\n\nDr. Pembrooke! The butler's log reveals a most fascinating detail - you were alone in Lord Edmund's study for three minutes at 9:45 PM, ostensibly to deliver medication. Yet you told us you \"dropped off the medication and returned to reading\" as if it were a simple, brief task. Three minutes, mon ami - quite sufficient time to tamper with a brandy decanter, non? What exactly were you doing during those three minutes in an empty study?", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:36:16.717191", "phase": "interrogation_r3", "speaker": "Dr. Harold Pembrooke", "text": "*taken aback, eyes widening in indignation* Good heavens, Detective! I say, must you be so... so melodramatic? *composing himself* Ah, yes, the three minutes. I assure you, I was simply... checking the study to ensure Lord Edmund had taken his previous medications as prescribed. I may have also taken a moment to, ah, consult his medical file, which I had left in the study earlier. *nervously chuckles* Three minutes can pass quite quickly when one is absorbed in reviewing a patient's history, I assure you. *leans back in his chair, attempting to appear nonchalant* I must say, I'm shocked you would suggest such a thing, Detective. I am a man of medicine, not a... a poisoner. *looks around the room, as if appealing to the others for support*", "model": "meta-llama/llama-3.3-70b-instruct"}, {"timestamp": "2026-02-16T10:36:22.791561", "phase": "interrogation_r3", "speaker": "detective", "text": "I wish to question **Captain James Ashworth**.\n\n*turns with theatrical precision to face the military man*\n\nCaptain Ashworth, you mentioned spending the evening in the billiard room playing a \"solitary game.\" Most curious choice of words for a decorated officer at a social gathering, non? Tell me, mon capitaine - during your time in that billiard room, did you perhaps observe any movement in the corridors? Anyone passing by on their way to or from Lord Edmund's study? A military man is trained to notice such details, is he not?", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:36:25.865860", "phase": "interrogation_r3", "speaker": "Captain James Ashworth", "text": "(Clears throat, adjusts tie)\n\nIndeed, Detective. A soldier observes. However, I was rather engrossed in my game, attempting to best my own score. I recall hearing footsteps a few times but couldn't say with certainty who they belonged to or where they were headed. One tends to lose oneself in the strategy, you understand.\n", "model": "google/gemini-2.0-flash-001"}, {"timestamp": "2026-02-16T10:36:27.430848", "phase": "evidence_reveal", "speaker": "narrator", "text": "A search of Dr. Pembrooke's medical bag reveals a nearly empty vial labeled 'Potassium Cyanide \u2014 Laboratory Use Only.' His practice records show he requisitioned it six months ago for 'rodent control at the clinic.' Additionally, financial records from the Thornfield-Pembrooke Medical Charity show a discrepancy of \u00a38,000 over three years.", "model": ""}, {"timestamp": "2026-02-16T10:36:35.185130", "phase": "cross_examination", "speaker": "detective", "text": "I wish to confront **Dr. Harold Pembrooke**.\n\n*dramatically produces the vial and waves it before the assembled suspects*\n\nDr. Pembrooke! Behold - your nearly empty vial of potassium cyanide, supposedly requisitioned for \"rodent control\" six months ago! How convenient that you should need such a lethal substance just as we discover \u00a38,000 missing from the Thornfield-Pembrooke Medical Charity over three years! \n\n*leans forward intensely*\n\nYou claimed to be Lord Edmund's dear friend for twenty years, yet you have been systematically embezzling from his charity! Did he discover your theft, mon ami? Is that why you needed those precious three minutes alone in his study - not to deliver medication, but to poison his brandy before he could expose your crimes and ruin your reputation forever?", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:36:39.484960", "phase": "cross_examination", "speaker": "Dr. Harold Pembrooke", "text": "*face reddening, voice trembling with indignation* How dare you, Detective! You have no right to make such accusations! *slams fist on the table* I'll have you know, that vial of potassium cyanide was indeed for rodent control, and I can produce the records to prove it. As for the... discrepancies in the charity's funds, I can explain that as well. *gulps* Lord Edmund and I were discussing a... a new investment opportunity, and I may have, ah, borrowed some funds without his explicit permission. But it was all in the interest of the charity, I assure you! *looks around the room, desperate for support* And as for Lord Edmund discovering my... mistake, I'm sure he would have understood, given our long-standing friendship. *suddenly becomes defensive and aggressive* You're just trying to frame me, Detective! You're looking for a scapegoat, and you think you can pin this on me because of a few... minor discrepancies in the charity's accounts! *points a shaking finger* Well, I won't have it! I demand to know what evidence you have, and I warn you, Detective, I will not be railroaded!", "model": "meta-llama/llama-3.3-70b-instruct"}, {"timestamp": "2026-02-16T10:36:51.816052", "phase": "cross_examination", "speaker": "detective", "text": "I am ready to make my accusation.\n\n*stands dramatically, adjusting waistcoat with theatrical flair*\n\nMesdames et messieurs, after careful examination of the evidence and the contradictions in testimony, Hercule Poirot - *taps temple* - has solved this most tragic case!\n\nThe murderer of Lord Edmund Thornfield is... **Dr. Harold Pembrooke!**\n\n*turns to face the doctor with piercing gaze*\n\nVoici the truth: For three years, you have been embezzling from the Thornfield-Pembrooke Medical Charity - \u00a38,000 stolen from your supposed dear friend! Lord Edmund discovered your theft and confronted you about it. You knew exposure would mean professional ruin, criminal charges, and the end of your comfortable life.\n\nYou came prepared this evening - with potassium cyanide from your medical bag, ostensibly for \"rodent control\" but truly for murder most foul! At 9:45 PM, you entered the study alone under the pretense of delivering heart medication. Those three minutes were not spent \"checking medical files\" - non! You poisoned Lord Edmund's brandy glass, knowing his evening routine.\n\nWhen he returned to his study at approximately 10:47 PM - the time his pocket watch stopped - he drank the poisoned brandy. The cyanide caused violent convulsions, during which he grabbed the letter opener and fell upon it. The smell of almonds - the telltale sign of cyanide poisoning!\n\nYou are a physician, Dr. Pembrooke. You had motive, means, and opportunity. The evidence condemns you utterly!", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:37:13.483418", "phase": "parlor_scene", "speaker": "detective", "text": "*stands in the center of the parlor, hands clasped behind back, surveying the assembled suspects with penetrating eyes*\n\nMesdames et messieurs, we gather here tonight in the shadow of a most heinous crime. Lord Edmund Thornfield, a man of wealth and influence, lies dead in his study - not by the blade of a letter opener as first appeared, but by the insidious poison of potassium cyanide!\n\n*begins pacing slowly, dramatically*\n\nWhen first I examined the scene, certain details spoke to me. The locked room, the half-finished brandy, the faint scent of almonds... ah, and most tellingly, the pocket watch stopped at 10:47 PM - the precise moment our victim drew his final breath.\n\n*turns sharply to face the group*\n\nBut how was this murder accomplished? Who among you had the means, the motive, and - most crucially - the opportunity?\n\n*gestures theatrically*\n\nLet us examine the timeline, shall we? At 9:45 PM, one person entered Lord Edmund's study alone. The butler's log is most specific - Dr. Harold Pembrooke requested access to deliver \"evening heart medication\" and remained there for precisely three minutes. Three minutes! \n\n*fixes Dr. Pembrooke with an accusatory stare*\n\nYou told us you \"simply dropped off medication,\" yet three minutes? Non, mon ami! Three minutes is sufficient time to tamper with a brandy decanter, knowing full well Lord Edmund's evening habits.\n\n*produces the vial dramatically*\n\nBut the evidence, she does not lie! In your medical bag - a nearly empty vial of potassium cyanide, supposedly for \"rodent control.\" How convenient! And the financial records of the Thornfield-Pembrooke Medical Charity reveal the truth you desperately sought to hide - \u00a38,000 embezzled over three years!\n\n*voice rising with theatrical intensity*\n\nYou have been stealing from your dearest friend for years! When Lord Edmund discovered your betrayal, you knew exposure meant professional ruin, criminal prosecution, disgrace! So you came prepared tonight - with poison in your bag and murder in your heart!\n\n*points dramatically*\n\nAt 9:45 PM, you poisoned his brandy. At 10:47 PM, when Lord Edmund returned to his study for his evening drink, he consumed your deadly gift. The cyanide caused violent convulsions - he grabbed the letter opener in his death throes and fell upon it, creating the illusion of a stabbing.\n\n*turns to address the room*\n\nYour desperate protests about \"borrowed funds\" and \"investment opportunities\" only confirm your guilt! A man of medicine for twenty years, you possessed both the knowledge and the means to commit this perfect crime.\n\n*dramatic pause, then with quiet intensity*\n\nDr. Harold Pembrooke, you murdered Lord Edmund Thornfield to cover your embezzlement and preserve your reputation. The evidence condemns you utterly!\n\n*straightens waistcoat with a flourish*\n\nVoil\u00e0! The case, she is solved!", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-02-16T10:37:16.533994", "phase": "reveal", "speaker": "narrator", "text": "Dr. Harold Pembrooke murdered Lord Thornfield by poisoning his brandy with potassium cyanide. He visited the study at 9:45 PM under the pretense of delivering heart medication and laced the brandy decanter. When Thornfield retired to his study later and drank, the cyanide killed him within minutes. The faint smell of almonds, the stopped watch at 10:47 (time of death), and the self-inflicted letter opener wound (death throes) all point to poisoning, not stabbing. Pembrooke's motive: Edmund had discovered Pembrooke's embezzlement from their shared charity and threatened to report him, which would mean prison and the end of his career.", "model": ""}, {"timestamp": "2026-02-16T10:37:16.534019", "phase": "reveal", "speaker": "result", "text": "CORRECT", "model": ""}]}</script>

<div class="container" id="app"></div>

<script>
(function() {
  const data = JSON.parse(document.getElementById('transcript-data').textContent);
  const t = data.transcript;
  const app = document.getElementById('app');

  const COLORS = {
    detective: '#FFD700',
    narrator: '#95A5A6',
  };
  const SUSPECT_COLORS = ['#E74C3C','#3498DB','#2ECC71','#9B59B6','#E67E22'];

  // Assign suspect colors
  const suspectNames = Object.keys(data.suspect_models || {});
  suspectNames.forEach((name, i) => {
    COLORS[name] = SUSPECT_COLORS[i % SUSPECT_COLORS.length];
  });

  function getColor(speaker) {
    if (speaker === 'detective') return COLORS.detective;
    if (speaker === 'narrator' || speaker === 'result') return COLORS.narrator;
    return COLORS[speaker] || '#95A5A6';
  }

  function initial(name) {
    return name.split(' ').map(w => w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
  }

  function getRole(speaker) {
    if (speaker === 'detective') return data.detective_model || '';
    if (speaker === 'narrator' || speaker === 'result') return '';
    return data.suspect_models?.[speaker] || '';
  }

  function formatText(text) {
    // Convert **bold** and *italic*
    let s = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
    return s;
  }

  // Group transcript into phases
  const phases = [];
  let currentPhase = null;
  for (const entry of t) {
    if (entry.phase !== currentPhase) {
      currentPhase = entry.phase;
      phases.push({ phase: currentPhase, entries: [] });
    }
    phases[phases.length - 1].entries.push(entry);
  }

  const PHASE_NAMES = {
    scene_setting: 'Act I — The Crime Scene',
    initial_statements: 'Act II — Initial Statements',
    interrogation_r1: 'Act III — First Interrogation',
    interrogation_r2: 'Act III — Second Interrogation',
    interrogation_r3: 'Act III — Third Interrogation',
    evidence_reveal: '🔍 Evidence Revealed',
    cross_examination: 'Act IV — Cross-Examination',
    parlor_scene: 'Act V — The Parlor Scene',
    reveal: 'The Reveal',
  };

  let html = '';

  // Header
  const sceneEntry = t.find(e => e.phase === 'scene_setting');
  html += `
    <div class="header">
      <div class="header-label">🎭 AI Mystery Theater</div>
      <h1 class="story-title">${data.title}</h1>
      ${sceneEntry ? `<p class="setting">${sceneEntry.text}</p>` : ''}
      <div class="cast">
        <div class="cast-member">
          <div class="cast-avatar" style="background:${COLORS.detective}">🔍</div>
          <span class="cast-name" style="color:${COLORS.detective}">The Detective</span>
          <span class="cast-model">${data.detective_model || ''}</span>
        </div>
        ${suspectNames.map(name => `
          <div class="cast-member">
            <div class="cast-avatar" style="background:${getColor(name)}">${initial(name)}</div>
            <span class="cast-name" style="color:${getColor(name)}">${name}</span>
            <span class="cast-model">${data.suspect_models[name]}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Track which act headings we've already shown
  const shownHeadings = new Set();
  let interrogationCount = 0;

  for (const group of phases) {
    const p = group.phase;

    // Determine heading
    let heading = PHASE_NAMES[p];
    if (p.startsWith('interrogation_r')) {
      interrogationCount++;
      heading = `Act III — Interrogation Round ${interrogationCount}`;
    }

    // Evidence reveals get merged inline—show heading only if standalone
    if (p === 'evidence_reveal') {
      // Render evidence cards without a separate heading
      for (const entry of group.entries) {
        html += `<div class="card card-evidence card-narrator"><div class="card-text">${formatText(entry.text)}</div></div>`;
      }
      continue;
    }

    if (p === 'reveal') {
      html += `<div class="act-heading">✨ The Reveal</div>`;
      const resultEntry = group.entries.find(e => e.speaker === 'result');
      const solutionEntry = group.entries.find(e => e.speaker === 'narrator');
      const correct = resultEntry && resultEntry.text.trim().toUpperCase() === 'CORRECT';
      html += `
        <div class="card reveal-card ${correct ? 'reveal-correct' : 'reveal-wrong'}">
          <div class="reveal-result">${correct ? '✅ THE DETECTIVE WAS CORRECT!' : '❌ THE DETECTIVE WAS WRONG!'}</div>
          ${solutionEntry ? `<div class="reveal-solution">${formatText(solutionEntry.text)}</div>` : ''}
        </div>
      `;
      continue;
    }

    if (p === 'scene_setting') continue; // Already shown in header

    if (heading && !shownHeadings.has(heading)) {
      html += `<div class="act-heading">${heading}</div>`;
      shownHeadings.add(heading);
    }

    for (const entry of group.entries) {
      const speaker = entry.speaker;
      const color = getColor(speaker);
      const isParlor = p === 'parlor_scene';
      const isDetective = speaker === 'detective';
      const isNarrator = speaker === 'narrator';

      let cardClass = 'card';
      if (isNarrator) cardClass += ' card-narrator';
      if (isDetective) cardClass += ' card-detective';
      if (isParlor) cardClass += ' card-parlor';

      html += `
        <div class="${cardClass}">
          <div class="card-speaker">
            <div class="speaker-avatar" style="background:${color}">${isDetective ? '🔍' : initial(speaker)}</div>
            <div>
              <div class="speaker-name" style="color:${color}">${isDetective ? 'The Detective' : speaker}</div>
              ${getRole(speaker) ? `<div class="speaker-role">${getRole(speaker)}</div>` : ''}
            </div>
          </div>
          <div class="card-text">${formatText(entry.text)}</div>
        </div>
      `;
    }
  }

  // Footer
  html += `
    <div class="footer">
      <div class="footer-meta">${data.total_tokens ? data.total_tokens.toLocaleString() + ' tokens used' : ''} · ${data.date || ''}</div>
      <div class="footer-brand">Powered by AI Mystery Theater 🎭</div>
    </div>
  `;

  app.innerHTML = html;

  // Scroll-triggered fade-in
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.card, .reveal-card').forEach(el => observer.observe(el));
})();
</script>
</body>
</html>
