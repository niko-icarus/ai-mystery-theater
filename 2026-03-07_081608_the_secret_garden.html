<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 AI Mystery Theater</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-card: #13131a;
  --bg-card-hover: #1a1a24;
  --gold: #FFD700;
  --gold-dim: #b8960f;
  --amber: #d4a017;
  --text: #e8e0d4;
  --text-dim: #8a8278;
  --border: #2a2520;
  --detective: #FFD700;
  --suspect1: #E74C3C;
  --suspect2: #3498DB;
  --suspect3: #2ECC71;
  --suspect4: #9B59B6;
  --suspect5: #E67E22;
  --narrator: #95A5A6;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 100%, rgba(139,69,19,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 3rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 3rem;
}

.header-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.4em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.story-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 900;
  color: var(--gold);
  line-height: 1.15;
  margin-bottom: 1rem;
  text-shadow: 0 0 40px rgba(255,215,0,0.15);
}

.setting {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--text-dim);
  font-size: 1.05rem;
  max-width: 600px;
  margin: 0 auto 2rem;
}

/* Cast */
.cast {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  justify-content: center;
  margin-top: 1.5rem;
}

.cast-member {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0.35rem 0.85rem;
  font-size: 0.8rem;
}

.cast-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.7rem;
  color: #000;
  flex-shrink: 0;
}

.cast-name { font-weight: 600; }
.cast-model {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
}

/* Act headings */
.act-heading {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  margin: 3.5rem 0 1.5rem;
  position: relative;
}

.act-heading::before,
.act-heading::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 60px;
  height: 1px;
  background: var(--border);
}
.act-heading::before { right: calc(100% + 12px); }
.act-heading::after { left: calc(100% + 12px); }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.25rem;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
}

.card-speaker {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  margin-bottom: 0.75rem;
}

.speaker-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: #000;
  flex-shrink: 0;
}

.speaker-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 1.05rem;
}

.speaker-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
}

.card-text {
  white-space: pre-wrap;
  font-size: 0.95rem;
  line-height: 1.75;
}

.card-text em, .card-text i {
  color: var(--text-dim);
  font-style: italic;
}

/* Narrator / Scene card */
.card-narrator {
  border-color: rgba(149,165,166,0.3);
  background: linear-gradient(135deg, var(--bg-card) 0%, #141418 100%);
}

.card-narrator .card-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #c0b8a8;
}

/* Detective card */
.card-detective {
  border-left: 3px solid var(--detective);
}

/* Evidence card */
.card-evidence {
  border: 1px solid rgba(231,76,60,0.5);
  background: linear-gradient(135deg, #1a1015 0%, var(--bg-card) 100%);
  position: relative;
  overflow: hidden;
}

.card-evidence::before {
  content: '🔍 EVIDENCE';
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: #E74C3C;
  position: absolute;
  top: 0.75rem;
  right: 1rem;
}

.card-evidence.visible {
  animation: evidenceFlash 0.6s ease;
}

@keyframes evidenceFlash {
  0% { box-shadow: 0 0 0 rgba(231,76,60,0); }
  30% { box-shadow: 0 0 30px rgba(231,76,60,0.3); }
  100% { box-shadow: 0 0 0 rgba(231,76,60,0); }
}

/* Reveal */
.reveal-card {
  text-align: center;
  padding: 2.5rem;
  margin: 2rem 0;
  border-radius: 16px;
  border: 2px solid;
}

.reveal-correct {
  border-color: rgba(46,204,113,0.6);
  background: linear-gradient(135deg, #0a1a10 0%, var(--bg-card) 100%);
}

.reveal-wrong {
  border-color: rgba(231,76,60,0.6);
  background: linear-gradient(135deg, #1a0a0a 0%, var(--bg-card) 100%);
}

.reveal-card.visible {
  animation: revealGlow 2s ease infinite;
}

.reveal-correct.visible {
  animation: revealGlowGreen 2s ease infinite;
}

.reveal-wrong.visible {
  animation: revealGlowRed 2s ease infinite;
}

@keyframes revealGlowGreen {
  0%, 100% { box-shadow: 0 0 20px rgba(46,204,113,0.1); }
  50% { box-shadow: 0 0 40px rgba(46,204,113,0.25); }
}

@keyframes revealGlowRed {
  0%, 100% { box-shadow: 0 0 20px rgba(231,76,60,0.1); }
  50% { box-shadow: 0 0 40px rgba(231,76,60,0.25); }
}

.reveal-result {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 900;
  margin-bottom: 1rem;
}

.reveal-correct .reveal-result { color: #2ECC71; }
.reveal-wrong .reveal-result { color: #E74C3C; }

.reveal-solution {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--text-dim);
  line-height: 1.7;
  max-width: 600px;
  margin: 0 auto;
}

/* Parlor scene */
.card-parlor {
  border: 1px solid rgba(255,215,0,0.3);
  background: linear-gradient(135deg, #14120a 0%, var(--bg-card) 100%);
  padding: 2rem;
}

/* Footer */
.footer {
  text-align: center;
  padding: 3rem 0 2rem;
  margin-top: 3rem;
  border-top: 1px solid var(--border);
}

.footer-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}

.footer-brand {
  font-family: 'Playfair Display', serif;
  font-size: 0.85rem;
  color: var(--gold-dim);
}

/* Thinking sections */
.thinking-section {
  margin-bottom: 8px;
  cursor: pointer;
  border-left: 2px solid rgba(255,215,0,0.2);
  padding-left: 12px;
}
.thinking-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: #666;
  letter-spacing: 0.05em;
  user-select: none;
}
.thinking-label::after {
  content: ' ▸';
}
.thinking-section.expanded .thinking-label::after {
  content: ' ▾';
}
.thinking-content {
  font-style: italic;
  color: #888;
  font-size: 0.85rem;
  line-height: 1.5;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  margin-top: 4px;
}
.thinking-section.expanded .thinking-content {
  max-height: 500px;
}

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 1rem; }
  .header { padding: 2rem 0 1.5rem; }
  .card { padding: 1.15rem; }
  .act-heading::before, .act-heading::after { width: 30px; }
  .cast { gap: 0.5rem; }
}
</style>
</head>

fidence and cooperation. I'll emphasize my role as a host and how I discovered the body, maintaining my carefully constructed alibi."}, {"timestamp": "2026-03-07T08:11:53.868815", "phase": "initial_statements", "speaker": "Commandant Neil O'Brien", "text": "\"Commandant Neil O'Brien, Officer in the French Foreign Legion, at your service.\" *I stand a little straighter, hand instinctively going to the hilt of my sabre.* \"My acquaintance with Monsieur Brayne was brief, limited to this evening as a guest of Monsieur Valentin. I spent the evening in the drawing room and occasionally in the garden, enjoying fresh air.\"", "model": "google/gemini-2.0-flash-001", "thinking": "This is it, the moment I've been dreading. I must remain calm, collected, and emphasize my military service to establish credibility. The fewer questions about my whereabouts and Lady Margaret the better. I need to make this short and formal to avoid suspicion."}, {"timestamp": "2026-03-07T08:12:04.721371", "phase": "initial_statements", "speaker": "Lord Dorian Galloway", "text": "*straightening my Order of the Garter with visible pride* \"I am Lord Dorian Galloway, English Ambassador to France. I had no particular relationship with Mr. Brayne beyond finding him rather vulgar, though harmless. I remained in the drawing room this entire evening, except for one brief stroll into the garden for air. My wife can confirm my movements, as she was with me nearly the entire time.\" *glances pointedly at O'Brien* \"Though I must say, Commandant O'Brien seemed rather... preoccupied this evening.\"", "model": "deepseek/deepseek-chat", "thinking": "I must maintain my composure while subtly casting suspicion on O'Brien. My disdain for him is personal, but the detective doesn't need to know that."}, {"timestamp": "2026-03-07T08:12:09.123805", "phase": "initial_statements", "speaker": "Dr. Henri Simon", "text": "*pushing glasses up the bridge of his nose* \"Good evening. I am Dr. Henri Simon, a physician and scientist. I was acquainted with Mr. Brayne, but our relationship was merely professional. I was in the drawing room for most of the evening, engaged in a discussion with Father Brown about philosophy. I only stepped into the garden after being summoned to examine Mr. Brayne's body.\"", "model": "mistralai/mistral-large-2411", "thinking": "I must establish my credentials and relationship with the victim clearly. It's crucial to maintain a calm and collected demeanor, providing only the facts."}, {"timestamp": "2026-03-07T08:12:18.869579", "phase": "initial_statements", "speaker": "Father Brown", "text": "[THINKING] I must be cautious in my words, revealing just enough to be helpful, but not so much that I arouse suspicion. As a priest, I am accustomed to being a listener, not a speaker, so I must tread carefully. I will stick to the facts and express my sorrow at the tragedy that has occurred.\n\n\"Good evening, Detective. My name is Father Brown, and I am a Catholic priest from Essex. I had the pleasure of meeting the victim, Mr. Brayne, earlier this evening, although I didn't know him previously. I was invited to this dinner party by our host, Aristide Valentin, whom I met during a recent visit to England. As for my whereabouts this evening, I was in the drawing room for most of the time, engaged in a most fascinating conversation with Dr. Simon about theology and philosophy. I did not enter the garden until after the... unfortunate discovery was made.\"", "model": "meta-llama/llama-3.3-70b-instruct"}, {"timestamp": "2026-03-07T08:12:33.655812", "phase": "interrogation_r1", "speaker": "detective", "text": "[THINKING] I must start with the most obvious angle - the weapon. O'Brien carries a sabre and showed defensive body language when mentioning it. His military training would give him the skill for such a precise blow, and as a guest, he would have had opportunity to move about freely.\n\n*adjusts my cufflinks with theatrical precision and fixes O'Brien with a penetrating stare*\n\nCommandant Neil O'Brien, I could not help but notice your instinctive gesture toward your sabre when introducing yourself. As a military man, you would certainly possess the skill for such a precise, powerful stroke. Tell me, Commandant - where exactly is your sabre at this very moment? And more importantly, has it left your possession at any point this evening?", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] Several intriguing points emerge from these statements. Most notably, multiple suspects claim to have been in the garden at various times - O'Brien \"occasionally,\" Galloway for \"one brief stroll,\" yet none mention seeing each other or Brayne during these garden visits. The missing weapon is the central mystery - a blade capable of such a clean decapitation simply vanishing is impossible unless someone had means to dispose of it immediately. O'Brien's instinctive hand movement to his sabre is telling, and Galloway's pointed comment about O'Brien being \"preoccupied\" suggests tension worth exploring.\n\nMy immediate strategy is to establish a precise timeline of garden movements and probe the weapon mystery. O'Brien, as a military man with a sabre, has both means and suspicious body language. However, I must not overlook Valentin himself - as host and discoverer of the body, he had the best opportunity to dispose of evidence."}, {"timestamp": "2026-03-07T08:12:37.183215", "phase": "interrogation_r1", "speaker": "Commandant Neil O'Brien", "text": "[THINKING] This is exactly what I feared. My sabre is the obvious weapon, and he's going for it immediately. I must remain calm and truthful, but also convey my disgust at his accusation.]\n\n*A muscle twitches in my jaw. My hand moves to the sabre again, this time resting firmly on the hilt.* \"Detective, this sabre is part of my Legion uniform. I carry it always. It has remained at my side throughout this entire\u2026 unfortunate evening.\" *My eyes narrow.* \"Are you implying I would decapitate a guest in Monsieur Valentin's garden? I find that deeply offensive.\"\n", "model": "google/gemini-2.0-flash-001"}, {"timestamp": "2026-03-07T08:12:50.234441", "phase": "interrogation_r1", "speaker": "detective", "text": "[THINKING] Valentin's vague timeline is suspicious - he claims to have stepped into the garden \"for a moment\" before discovering the body, but this conveniently explains his presence at the crime scene. As host and famous detective, he would know how to dispose of evidence perfectly.\n\n*turns slowly toward the host, stroking my mustache thoughtfully*\n\nAristide Valentin, mon ami, your statement intrigues me greatly. You say you stepped into the garden \"for a moment\" before discovering poor Brayne's body. But surely a detective of your caliber would be more precise about timing in such a crucial matter? Tell me exactly - how long were you in that garden before you found the body, and what specifically drew you outside at that particular moment?", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] O'Brien's response was defensive but not necessarily guilty - his sabre remaining at his side actually creates a problem for him as a suspect, since the weapon disappeared completely. More intriguingly, I need to establish the timeline of garden movements. Valentin, as host and discoverer of the body, had the most opportunity to dispose of evidence. His claim of only stepping into the garden \"for a moment\" before discovering the body is suspiciously vague and convenient. If he's lying about his garden movements, he could have committed the murder and disposed of the weapon before \"discovering\" the body.\n\nMy strategy now is to press Valentin on this timeline and his movements. As the most famous detective in Europe, he would know exactly how to commit the perfect crime and destroy evidence. The fact that no weapon was found despite a thorough search suggests someone with intimate knowledge of the house and grounds."}, {"timestamp": "2026-03-07T08:12:54.686751", "phase": "interrogation_r1", "speaker": "Aristide Valentin", "text": "*maintaining steady eye contact* Ah, the fresh air called to me, a moment of respite after an evening of hosting. I was outside for scarcely five minutes, merely taking in the night's air and the glow of the moon between the clouds\u2014quite the sight, really. It was at that point the unfortunate discovery of Mr. Brayne's body occurred.", "model": "openai/gpt-4o", "thinking": "I must tread carefully here, appearing both forthright and unperturbed to avoid raising further suspicion. Emphasizing a plausible reason for stepping out and the brief duration should suffice, keeping the focus away from any potential inconsistencies. I'll lean into the weather and the desire for fresh air as my excuse."}, {"timestamp": "2026-03-07T08:12:56.339185", "phase": "evidence_reveal", "speaker": "narrator", "text": "Dr. Simon's medical examination confirms the decapitation was performed with a single blow from a heavy, sharp blade \u2014 consistent with a cavalry sabre or similar military sword. The cut is precise and clean, suggesting the wielder had significant strength or training. The body shows no defensive wounds \u2014 Brayne was likely struck from behind without warning. A thorough search of the garden reveals no weapon: no blade was found hidden in bushes, buried in soil, or thrown over the wall. The wall spikes show no disturbance. Ivan confirms no one carried any large object in or out through the front door.", "model": ""}, {"timestamp": "2026-03-07T08:13:09.076535", "phase": "interrogation_r2", "speaker": "detective", "text": "[THINKING] Galloway's pointed comment about O'Brien being \"preoccupied\" was deliberate and accusatory. Given the new evidence about the sabre-like weapon, I must determine if Galloway observed something specific or is deflecting suspicion. His observation could be key to understanding the timeline and movements.\n\n*turns sharply toward the Ambassador, eyes gleaming with interest*\n\nLord Dorian Galloway, you made quite a specific observation about Commandant O'Brien being \"preoccupied\" this evening. A man of your diplomatic experience does not make such pointed remarks without reason. What exactly did you observe about the Commandant's behavior that struck you as unusual? And when precisely did you notice this... preoccupation?", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] The new evidence creates a fascinating paradox - the wound is consistent with O'Brien's sabre, yet his sabre never left his side and no weapon was found despite exhaustive searching. This suggests either an accomplice who disposed of the weapon, or someone with access to a similar blade that could be hidden or destroyed completely. Lord Galloway made that pointed comment about O'Brien being \"preoccupied\" - this could indicate he observed something suspicious, or he's deflecting suspicion from himself. I need to probe what Galloway actually saw and why he felt compelled to mention O'Brien's behavior.\n\nMy strategy is to press Galloway on his specific observations of O'Brien and establish exactly what made him think O'Brien was \"preoccupied.\" This could reveal crucial information about the timeline or suspicious behavior, or expose Galloway's own guilty knowledge."}, {"timestamp": "2026-03-07T08:13:17.075049", "phase": "interrogation_r2", "speaker": "Lord Dorian Galloway", "text": "*adjusts cravat with irritation* \"I saw the Commandant slip out to the garden no less than three times during dinner - most unbecoming for an officer. And worse still...\" *voice drops to a venomous whisper* \"I witnessed him in deep conversation with my daughter Margaret near the poplars. The man has no sense of propriety - first disgracing himself with debts, now accosting young ladies at dinner parties!\" *snaps pocket watch shut* \"As for timing, this occurred during the fish course - around 8:15 if memory serves.\"", "model": "deepseek/deepseek-chat", "thinking": "The fool is taking my bait. I'll embellish just enough to cast suspicion without outright lying."}, {"timestamp": "2026-03-07T08:13:29.657227", "phase": "interrogation_r2", "speaker": "detective", "text": "[THINKING] Dr. Simon examined the body and would have intimate knowledge of the wound. His clinical detachment and his claimed alibi with Father Brown need scrutiny. As a scientist, he would understand exactly what type of weapon was used, and his professional knowledge could be covering guilty knowledge.\n\n*wheels around to face the doctor, eyes sharp with suspicion*\n\nDr. Henri Simon, your medical examination was remarkably thorough for someone who claims only a professional acquaintance with the victim. You determined the weapon was consistent with a cavalry sabre - quite specific for an initial assessment. Tell me, Doctor, during this lengthy philosophical discussion with Father Brown that kept you in the drawing room all evening, did you perhaps discuss the nature of death? And how long, precisely, would such a precise decapitation take to perform?", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] Galloway's revelation is explosive - O'Brien was in the garden multiple times and had a conversation with Margaret near the poplars around 8:15, which places him at the exact location where the body was found. However, this also introduces a new player - Margaret Galloway, who hasn't been mentioned as a suspect but was clearly present in the garden. Dr. Simon claimed to be discussing philosophy with Father Brown all evening, but I need to verify this alibi and probe whether Simon, as the medical examiner, might have inside knowledge about the wound that he's not sharing.\n\nMy strategy is to question Dr. Simon about his medical findings and his claimed alibi with Father Brown. As the person who examined the body, he would have the best understanding of the weapon used, and his clinical detachment seems suspicious given the horrific nature of the crime."}, {"timestamp": "2026-03-07T08:13:37.255789", "phase": "interrogation_r2", "speaker": "Dr. Henri Simon", "text": "*meeting the detective's gaze calmly* \"Detective, my medical assessment was thorough because that is my job. As for the weapon, the wound was remarkably clean, suggesting a heavy, sharp blade. A cavalry sabre is a plausible candidate, but it could be any similar weapon.\"\n\n*raising an eyebrow slightly* I assure you, my discussion with Father Brown was purely philosophical. We did not delve into morbid topics such as the nature of death.\n\n*pauses thoughtfully* As for the timing, a single, powerful blow like the one that killed Mr. Brayne would be swift. It would take mere seconds, assuming the executioner was strong and skilled.\"", "model": "mistralai/mistral-large-2411", "thinking": "I must maintain a calm and professional demeanor. The detective's suspicion is natural, but I should stick to the facts and avoid seeming defensive. It's important to clarify my medical assessment and the timeline."}, {"timestamp": "2026-03-07T08:13:38.900805", "phase": "evidence_reveal", "speaker": "narrator", "text": "Closer investigation reveals that Brayne was carrying a sealed letter in his jacket pocket, partially soaked with blood. The legible portions reference 'evidence that was manufactured' and 'an innocent man who still rots in prison.' The letter appears to be addressed to a Paris newspaper editor. Brayne had also made an appointment with a journalist for the following morning. Additionally, Commandant O'Brien's sabre has been examined \u2014 it is spotless, with no trace of blood, and its edge shows no signs of recent heavy use. Whatever blade killed Brayne, it was not O'Brien's.", "model": ""}, {"timestamp": "2026-03-07T08:13:51.089055", "phase": "interrogation_r3", "speaker": "detective", "text": "[THINKING] The letter reveals Brayne was exposing manufactured evidence and a wrongful imprisonment - this directly threatens Valentin's career and reputation as Chief of Paris Police. His nervous behavior during dinner and convenient discovery of the body now seem highly suspicious. I must press him on his knowledge of what Brayne was investigating.\n\n*fixes Valentin with a steely gaze, voice dropping to an ominous whisper*\n\nAristide Valentin, this letter speaks of manufactured evidence and an innocent man rotting in prison - matters that would fall squarely within your jurisdiction as Chief of the Paris Police. Tell me, mon ami, what case was Julius Brayne investigating? And more importantly, did you know about his appointment with that journalist tomorrow morning when you invited him to dinner tonight?", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] The letter is explosive - Brayne was exposing manufactured evidence that wrongly imprisoned someone, and he was meeting with a journalist tomorrow. This transforms the motive from personal to professional cover-up. Valentin, as Chief of Paris Police, would be most threatened by exposure of police misconduct or false evidence. His nervousness during dinner now makes sense - he knew what Brayne planned to reveal. O'Brien is cleared by the clean sabre, but Valentin had both motive and opportunity to silence Brayne before the newspaper meeting.\n\nMy strategy is to confront Valentin directly about the letter's contents and his potential involvement in the case Brayne was investigating. As the most famous detective in Europe, any scandal involving manufactured evidence would destroy his reputation and career. This gives him the strongest motive of anyone present."}, {"timestamp": "2026-03-07T08:13:54.722509", "phase": "interrogation_r3", "speaker": "Aristide Valentin", "text": "*raising an eyebrow, tone measured* A letter, you say? This is the first I've heard of such an investigation, or of any appointment with a journalist, for that matter. As for the accusations within, I would tread carefully, for it's easy for such claims to be unfounded. Perhaps this journalist holds the key to understanding why Brayne felt troubled tonight.", "model": "openai/gpt-4o", "thinking": "It's critical I deflect any link between me and this supposed investigation of Brayne's. I'll express genuine surprise and use my status to query the authenticity of the letter rather than acknowledging any awareness of Brayne's plans. Shifting the focus to the journalist might also divert the detective's attention."}, {"timestamp": "2026-03-07T08:14:09.038344", "phase": "interrogation_r3", "speaker": "detective", "text": "[THINKING] Father Brown has been remarkably quiet and unnoticed throughout this investigation, which could be either genuine innocence or perfect camouflage. As a priest, people confide in him, and his bumbling exterior might mask keen observations. I need to probe what he actually observed during his claimed philosophical discussion and whether anyone approached him with concerns or confessions.\n\n*turns slowly to the small, round priest, eyes gleaming with sudden interest*\n\nFather Brown, you have been remarkably quiet for a man of the cloth who claims to have spent the evening in deep philosophical discussion. As a priest, people often confide their troubles to you. Tell me, Father - during this long conversation with Dr. Simon, did you perhaps observe the comings and goings of the other guests? And more importantly, did anyone approach you this evening with... shall we say, matters weighing on their conscience?", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] Valentin's denial seems too convenient - as Chief of Police, he would likely know about any major investigation involving manufactured evidence in his jurisdiction. Father Brown has been suspiciously quiet and overlooked throughout this entire investigation, yet he's the one person who hasn't provided a detailed account of his movements or observations. His bumbling priest persona could be the perfect cover for a sharp mind observing everything. Given his theological discussions with Dr. Simon, he may have insights into the other suspects' behavior that he hasn't shared.\n\nMy strategy is to question Father Brown directly about what he observed during the evening, particularly during his claimed philosophical discussion with Dr. Simon. His position as an outsider and seemingly harmless priest would make him privy to conversations and behaviors others might have hidden. He may hold crucial observations about the other suspects' movements and demeanor."}, {"timestamp": "2026-03-07T08:14:27.986551", "phase": "interrogation_r3", "speaker": "Father Brown", "text": "[THINKING] The detective is probing for more information, and I must be careful not to reveal too much, while still appearing cooperative. I will share some general observations, but avoid any specifics that might implicate someone or reveal my own suspicions. I must also be mindful of the confidentiality of the confessional, even though no one has formally confessed to me this evening.\n\n\"Ah, yes, Detective, I did notice the comings and goings of the other guests, although I must admit that I was quite absorbed in my conversation with Dr. Simon. We were discussing the finer points of Thomas Aquinas' philosophy, and I found myself lost in thought at times. As for matters weighing on someone's conscience, well... I did sense that Mr. Brayne was troubled by something, but he didn't confide in me directly. He seemed restless and distracted, stepping in and out of the garden several times, but I didn't think much of it at the time, assuming he was simply enjoying the evening air. I must say, I am deeply saddened by the tragic events that have unfolded, and I pray that we may find some sense of clarity and resolution in the midst of this darkness.\"", "model": "meta-llama/llama-3.3-70b-instruct"}, {"timestamp": "2026-03-07T08:14:29.637026", "phase": "evidence_reveal", "speaker": "narrator", "text": "A careful re-examination of the entrance hall reveals that the wall displays fourteen weapons \u2014 swords, sabres, pikes, and daggers collected over Valentin's career. One cavalry sabre, third from the left on the upper rack, hangs at a slightly different angle from the others, as if it was recently removed and replaced. When tested, this sabre shows microscopic traces of blood in the junction between blade and hilt \u2014 traces that survived a hasty cleaning. The blade edge is consistent with the wound profile Dr. Simon described. The weapon never left the house because it was always in the house \u2014 hanging on the wall in plain sight among a collection of similar weapons.", "model": ""}, {"timestamp": "2026-03-07T08:14:43.033376", "phase": "cross_examination", "speaker": "detective", "text": "[THINKING] I have overwhelming evidence against Valentin - the murder weapon was his own sabre from his collection, he had motive to silence Brayne's investigation, and his timeline is suspicious. However, I should confront him with the specific contradiction about the weapon before making my final accusation to see his reaction.\n\n*whirls dramatically to face the host, pointing an accusatory finger*\n\nAristide Valentin! You claimed to have spent the evening \"attending to your guests inside the house,\" yet the murder weapon was your own cavalry sabre from your entrance hall collection - hastily cleaned but still bearing microscopic blood traces! You said you stepped into the garden \"for a moment\" before discovering the body, but that was enough time to replace the weapon on your wall display. How do you explain that the weapon that killed Julius Brayne was hanging in your own entrance hall all along?", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] The evidence is now crystal clear - the murder weapon was Valentin's own cavalry sabre from his wall display, hastily cleaned and replaced but still bearing microscopic blood traces. This creates a devastating contradiction with Valentin's earlier statement that he spent the evening \"attending to guests inside the house\" and only stepped into the garden \"for a moment\" before discovering the body. The weapon being his own, combined with his motive to silence Brayne's investigation into manufactured evidence, makes him the only logical suspect. He had exclusive access to the weapon, the expertise to use it effectively, and the perfect cover story as the \"discoverer\" of the body.\n\nI have enough evidence to make my accusation - Valentin is the murderer, using his own weapon from his collection, cleaning it hastily, and then \"discovering\" the body to establish his alibi. The missing weapon mystery is solved - it never left the house because it was always in the house.\n\nI am ready to make my accusation."}, {"timestamp": "2026-03-07T08:14:48.054927", "phase": "cross_examination", "speaker": "Aristide Valentin", "text": "*leaning forward with an intense gaze* Ah, my dear detective, a clever observation indeed, yet not as damning as you might think. Consider for a moment the possibility that someone else in the house knows these walls and their contents nearly as well as I do\u2014my loyal servant, Ivan. He has always been protective of this house, but sometimes fervent loyalty can lead to unforeseen actions. Could it not be that someone else took advantage of my collection, using it to frame me in this heinous act?", "model": "openai/gpt-4o", "thinking": "This is a delicate moment, one where I must remain composed and offer an alternate perspective. Denying the evidence directly would only serve to increase suspicion. Instead, implicating another will provide a plausible explanation while deflecting attention away from myself."}, {"timestamp": "2026-03-07T08:14:58.373965", "phase": "cross_examination", "speaker": "detective", "text": "[THINKING] I have overwhelming evidence against Valentin and his desperate deflection to Ivan only confirms his guilt. I have enough to make my accusation with confidence - the weapon, motive, opportunity, and his suspicious behavior all point to him as the murderer.\n\n*straightens to full height, mustache bristling with theatrical indignation*\n\nI am ready to make my accusation.", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] Valentin's deflection to Ivan is desperate but reveals his guilt - he's grasping for alternative explanations rather than providing a credible alibi. The evidence is overwhelming: his weapon, his motive (the letter threatening his career), his opportunity as host, and his suspicious \"discovery\" of the body. No other suspect has both access to his weapon collection AND motive to kill Brayne over the manufactured evidence investigation. His attempt to blame Ivan only confirms he knows he's caught.\n\nI have sufficient evidence to make my accusation. Valentin is clearly the murderer - he used his own weapon, had the strongest motive to silence Brayne's investigation into police misconduct, and his timeline allows for the crime. His deflection attempt seals his guilt.\n\nI am ready to make my accusation."}, {"timestamp": "2026-03-07T08:15:21.915975", "phase": "parlor_scene", "speaker": "detective", "text": "[THINKING] This is my moment - I must present the case with theatrical brilliance, laying out each piece of evidence methodically to build an unassailable conclusion. Valentin is clearly the murderer, and I must expose how he used his position, knowledge, and resources to commit what he thought would be the perfect crime.\n\n*stands in the center of the parlor, hands clasped behind back, surveying each suspect with piercing eyes*\n\nMesdames et messieurs, we have before us a most fascinating puzzle - a murder weapon that vanished into thin air, yet never left the scene of the crime! But let me walk you through this web of deception, step by carefully planned step.\n\n*begins pacing dramatically*\n\nFirst, the victim - Julius K. Brayne, a man troubled this evening, restless, d sabre, your convenient timeline that placed you alone in the garden at precisely the right moment.\n\n**Aristide Valentin - you are the murderer of Julius K. Brayne!**", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-03-07T08:15:32.273638", "phase": "reactions", "speaker": "Aristide Valentin", "text": "*pausing in silence, eyes shadowed but intense*\n\nAh, you have orchestrated quite the performance, detective. Indeed, I underestimated both your resolve and attention to detail. *straightens, voice steady but edged with resignation* Yes, it was I who silenced Julius Brayne. He threatened not just my career, but the very integrity of the work I have done\u2014the lives I have saved through what you call fabricated evidence, I call justice. A decision made in the service of the greater good, but a decision that demanded a cost I was willing to pay. \n\n*with a hint of defiance* Yet understand this, I did not act out of malice or mere self-preservation, but to preserve what order we have in this chaotic world. Julius Brayne was the sacrifice I made to save countless others. *turns to address the room* If it were not for him, the truth might have remained buried, and my work continued unhindered. \n\n*lowers head, voice turning solemn* But even the greatest of us can make one fatal error. And so here I stand, exposed, by an impeccable deduction of yet another great detective. An ending I had not foreseen, yet perhaps, indeed, the inevitable conclusion.", "model": "openai/gpt-4o", "thinking": "The net has closed, and though the evidence against me is substantial, I must make my final stand. Whether through confession, deflection, or a breakdown, the truth of my motivations must be addressed\u2014if only to seize the narrative one last time. The mask must drop, if only to protect the shards of my own truth."}, {"timestamp": "2026-03-07T08:15:36.506820", "phase": "reactions", "speaker": "Commandant Neil O'Brien", "text": "[THINKING] This is absurd! Valentin, a murderer? Preposterous! But this accusation throws everything into chaos. I must focus on defending myself and discrediting this madman. If I can sow seeds of doubt about the detective, perhaps he will turn his attention elsewhere. ]\n\n*I scoff, a mixture of disbelief and outrage on my face.* \"Detective, with all due respect, that is utter nonsense!\" *I take a step forward, hands clasped behind my back.* \"To accuse Monsieur Valentin, our host, the Chief of Police himself, on such flimsy conjecture... it's laughable. You have no evidence linking him directly to the act!\"\n\n*My voice rises in indignation.* \"And microscopic traces of blood? I'm a Legionnaire, Detective, not a fool! Such a claim is easily manufactured to fit your\u2026 theatrical narrative. You are grasping at straws. Do you have any proof? Or are you just enjoying your moment in the spotlight?\"\n\n*I cast a glance at Valentin, concern etched on my face.* \"This is madness, Detective. Pure madness. Do you have any evidence? I was in that garden myself, and I saw things that cannot be explained away so simply!\"\n", "model": "google/gemini-2.0-flash-001"}, {"timestamp": "2026-03-07T08:15:46.855425", "phase": "reactions", "speaker": "Lord Dorian Galloway", "text": "*stands abruptly, face flushed with indignation* \"Preposterous! Aristide Valentin, a murderer? Detective, you overreach yourself! Valentin is a man of impeccable honor - such a vile accusation is an insult to French justice itself!\" *glances nervously toward the garden* \"Have you even considered that O'Brien's military training makes him uniquely capable of such a clean stroke? The man's a dishonorable rake!\"", "model": "deepseek/deepseek-chat", "thinking": "Valentin? The murderer? This is absurd! But if he's truly implicated, I must ensure my own secrets remain buried."}, {"timestamp": "2026-03-07T08:15:52.490199", "phase": "reactions", "speaker": "Dr. Henri Simon", "text": "*standing abruptly, voice trembling with urgency* \"Detective, this is a grave accusation you are making. While I admit that Valentin's composure upon discovering the body was unusual, there are crucial factors you must consider.\"\n\n*adjusts glasses nervously* \"The cut on Brayne's body was remarkably clean and precise, suggesting someone with training or great strength. Moreover, the garden is sealed; no one could enter or leave unnoticed. We must consider all possibilities before making such a definitive accusation.\"\n\n*turns to Valentin, voice steady* \"Valentin, if you have any information that can clarify this situation, now is the time to speak. The truth must come to light, no matter how painful it may be.\"", "model": "mistralai/mistral-large-2411", "thinking": "This is a grave error. Valentin's composure was peculiar, but accusing him without concrete evidence is premature. I must interject with my observations and maintain the integrity of the investigation."}, {"timestamp": "2026-03-07T08:16:06.390873", "phase": "reactions", "speaker": "Father Brown", "text": "[THINKING] The detective has presented a convincing case, but I fear he may be mistaken. As a priest, I have seen the depths of human nature, and I believe that the truth is often more complex than it seems. I must speak out, not to defend Valentin, but to highlight the doubts that still linger in my mind.\n\n\"Dear Detective, I must commend you on your remarkable powers of observation and deduction. Your theory is indeed plausible, and I would not be surprised if it were true. And yet... as I reflect on the events of this evening, I am reminded of the wisdom of the great theologian, St. Augustine, who said, 'The truth is like a lion; you don't have to defend it. Just let it loose, and it will defend itself.' I fear that we may be rushing to judgment, and that the truth may still be hiding in plain sight.\n\n\"I must confess, I have always been troubled by the fact that the murder weapon was already present in the house. It seems to me that this is a crucial detail, one that points to a deeper truth. And I must ask, Detective, have you considered the possibility that the killer may not have been acting alone? That there may be more to this story than meets the eye?\n\n\"As I look around this room, I see a group of individuals, each with their own secrets and motivations. And I am reminded that, as a priest, I have seen the devastating consequences of sin and deceit. But I have also seen the redemptive power of truth and forgiveness.\n\n\"I implore you, Detective, to consider the possibility that the truth may be more complex, more nuanced, than a simple accusation. Let us not rush to judgment, but rather, let us seek the truth with humility and compassion. For in the end, it is not our task to condemn, but to seek justice, and to bring healing to those who have been hurt.\"\n\n(pauses, looking around the room with a deep sense of sorrow and compassion)\n\n\"I fear that I may have said too much, or perhaps not enough. But I hope that my words may have shed some light on the darkness that has descended upon us. May God have mercy on us all, and may the truth be revealed in His time.\"", "model": "meta-llama/llama-3.3-70b-instruct"}, {"timestamp": "2026-03-07T08:16:08.034540", "phase": "reveal", "speaker": "narrator", "text": "Aristide Valentin, the Chief of the Paris Police and the host of the dinner party, murdered Julius K. Brayne by decapitating him with a cavalry sabre taken from his own weapons collection in the entrance hall. Brayne had discovered that Valentin \u2014 the great champion of justice \u2014 had fabricated evidence to convict an innocent man, and was preparing to expose him to the press. Valentin invited Brayne to dinner at his own home specifically because the sealed garden and guarded door would create an 'impossible' crime: no weapon could enter or leave. But the weapon was already inside, hanging on the wall. Valentin took the sabre from the hall, followed Brayne into the garden, struck him from behind with a single powerful blow, then returned inside, cleaned the blade, and hung it back in its place among the other weapons \u2014 hiding it in plain sight. The entrance hall was full of weapons; one more or less attracted no attention. Ivan, the loyal doorman, noticed nothing because the sabres had always been there. The crime was solved not by finding the weapon, but by realizing it had never been missing.", "model": ""}, {"timestamp": "2026-03-07T08:16:08.034648", "phase": "reveal", "speaker": "result", "text": "CORRECT", "model": ""}, {"timestamp": "2026-03-07T08:16:08.034660", "phase": "reveal", "speaker": "score", "text": "  Correct killer: \u2713 YES", "model": ""}]}</script>

<div class="container" id="app"></div>

<script>
(function() {
  const data = JSON.parse(document.getElementById('transcript-data').textContent);
  const t = data.transcript;
  const app = document.getElementById('app');

  const COLORS = {
    detective: '#FFD700',
    narrator: '#95A5A6',
  };
  const SUSPECT_COLORS = ['#E74C3C','#3498DB','#2ECC71','#9B59B6','#E67E22'];

  // Assign suspect colors
  const suspectNames = Object.keys(data.suspect_models || {});
  suspectNames.forEach((name, i) => {
    COLORS[name] = SUSPECT_COLORS[i % SUSPECT_COLORS.length];
  });

  function getColor(speaker) {
    if (speaker === 'detective') return COLORS.detective;
    if (speaker === 'narrator' || speaker === 'result') return COLORS.narrator;
    return COLORS[speaker] || '#95A5A6';
  }

  function initial(name) {
    return name.split(' ').map(w => w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
  }

  function getRole(speaker) {
    if (speaker === 'detective') return data.detective_model || '';
    if (speaker === 'narrator' || speaker === 'result') return '';
    return data.suspect_models?.[speaker] || '';
  }

  function formatText(text) {
    // Convert **bold** and *italic*
    let s = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
    return s;
  }

  // Group transcript into phases
  const phases = [];
  let currentPhase = null;
  for (const entry of t) {
    if (entry.phase !== currentPhase) {
      currentPhase = entry.phase;
      phases.push({ phase: currentPhase, entries: [] });
    }
    phases[phases.length - 1].entries.push(entry);
  }

  const PHASE_NAMES = {
    scene_setting: 'Act I — The Crime Scene',
    initial_statements: 'Act II — Initial Statements',
    interrogation_r1: 'Act III — First Interrogation',
    interrogation_r2: 'Act III — Second Interrogation',
    interrogation_r3: 'Act III — Third Interrogation',
    evidence_reveal: '🔍 Evidence Revealed',
    cross_examination: 'Act IV — Cross-Examination',
    parlor_scene: 'Act V — The Parlor Scene',
    reveal: 'The Reveal',
  };

  let html = '';

  // Header
  const sceneEntry = t.find(e => e.phase === 'scene_setting');
  html += `
    <div class="header">
      <div class="header-label">🎭 AI Mystery Theater</div>
      <h1 class="story-title">${data.title}</h1>
      ${sceneEntry ? `<p class="setting">${sceneEntry.text}</p>` : ''}
      <div class="cast">
        <div class="cast-member">
          <div class="cast-avatar" style="background:${COLORS.detective}">🔍</div>
          <span class="cast-name" style="color:${COLORS.detective}">The Detective</span>
          <span class="cast-model">${data.detective_model || ''}</span>
        </div>
        ${suspectNames.map(name => `
          <div class="cast-member">
            <div class="cast-avatar" style="background:${getColor(name)}">${initial(name)}</div>
            <span class="cast-name" style="color:${getColor(name)}">${name}</span>
            <span class="cast-model">${data.suspect_models[name]}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Track which act headings we've already shown
  const shownHeadings = new Set();
  let interrogationCount = 0;

  for (const group of phases) {
    const p = group.phase;

    // Determine heading
    let heading = PHASE_NAMES[p];
    if (p.startsWith('interrogation_r')) {
      interrogationCount++;
      heading = `Act III — Interrogation Round ${interrogationCount}`;
    }

    // Evidence reveals get merged inline—show heading only if standalone
    if (p === 'evidence_reveal') {
      // Render evidence cards without a separate heading
      for (const entry of group.entries) {
        html += `<div class="card card-evidence card-narrator"><div class="card-text">${formatText(entry.text)}</div></div>`;
      }
      continue;
    }

    if (p === 'reveal') {
      html += `<div class="act-heading">✨ The Reveal</div>`;
      const resultEntry = group.entries.find(e => e.speaker === 'result');
      const solutionEntry = group.entries.find(e => e.speaker === 'narrator');
      const correct = resultEntry && resultEntry.text.trim().toUpperCase() === 'CORRECT';
      html += `
        <div class="card reveal-card ${correct ? 'reveal-correct' : 'reveal-wrong'}">
          <div class="reveal-result">${correct ? '✅ THE DETECTIVE WAS CORRECT!' : '❌ THE DETECTIVE WAS WRONG!'}</div>
          ${solutionEntry ? `<div class="reveal-solution">${formatText(solutionEntry.text)}</div>` : ''}
        </div>
      `;
      continue;
    }

    if (p === 'scene_setting') continue; // Already shown in header

    if (heading && !shownHeadings.has(heading)) {
      html += `<div class="act-heading">${heading}</div>`;
      shownHeadings.add(heading);
    }

    for (const entry of group.entries) {
      const speaker = entry.speaker;
      const color = getColor(speaker);
      const isParlor = p === 'parlor_scene';
      const isDetective = speaker === 'detective';
      const isNarrator = speaker === 'narrator';

      let cardClass = 'card';
      if (isNarrator) cardClass += ' card-narrator';
      if (isDetective) cardClass += ' card-detective';
      if (isParlor) cardClass += ' card-parlor';

      html += `
        <div class="${cardClass}">
          <div class="card-speaker">
            <div class="speaker-avatar" style="background:${color}">${isDetective ? '🔍' : initial(speaker)}</div>
            <div>
              <div class="speaker-name" style="color:${color}">${isDetective ? 'The Detective' : speaker}</div>
              ${getRole(speaker) ? `<div class="speaker-role">${getRole(speaker)}</div>` : ''}
            </div>
          </div>
          ${entry.thinking ? `
          <div class="thinking-section" onclick="this.classList.toggle('expanded')">
            <span class="thinking-label">💭 Inner thoughts</span>
            <div class="thinking-content">${formatText(entry.thinking)}</div>
          </div>
          ` : ''}
          <div class="card-text">${formatText(entry.text)}</div>
        </div>
      `;
    }
  }

  // Footer
  html += `
    <div class="footer">
      <div class="footer-meta">${data.total_tokens ? data.total_tokens.toLocaleString() + ' tokens used' : ''} · ${data.date || ''}</div>
      <div class="footer-brand">Powered by AI Mystery Theater 🎭</div>
    </div>
  `;

  app.innerHTML = html;

  // Scroll-triggered fade-in
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.card, .reveal-card').forEach(el => observer.observe(el));
})();
</script>
</body>
</html>
