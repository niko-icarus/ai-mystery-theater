<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 AI Mystery Theater</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-card: #13131a;
  --bg-card-hover: #1a1a24;
  --gold: #FFD700;
  --gold-dim: #b8960f;
  --amber: #d4a017;
  --text: #e8e0d4;
  --text-dim: #8a8278;
  --border: #2a2520;
  --detective: #FFD700;
  --suspect1: #E74C3C;
  --suspect2: #3498DB;
  --suspect3: #2ECC71;
  --suspect4: #9B59B6;
  --suspect5: #E67E22;
  --narrator: #95A5A6;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 100%, rgba(139,69,19,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 3rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 3rem;
}

.header-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.4em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.story-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 900;
  color: var(--gold);
  line-height: 1.15;
  margin-bottom: 1rem;
  text-shadow: 0 0 40px rgba(255,215,0,0.15);
}

.setting {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--text-dim);
  font-size: 1.05rem;
  max-width: 600px;
  margin: 0 auto 2rem;
}

/* Cast */
.cast {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  justify-content: center;
  margin-top: 1.5rem;
}

.cast-member {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0.35rem 0.85rem;
  font-size: 0.8rem;
}

.cast-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.7rem;
  color: #000;
  flex-shrink: 0;
}

.cast-name { font-weight: 600; }
.cast-model {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
}

/* Act headings */
.act-heading {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  margin: 3.5rem 0 1.5rem;
  position: relative;
}

.act-heading::before,
.act-heading::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 60px;
  height: 1px;
  background: var(--border);
}
.act-heading::before { right: calc(100% + 12px); }
.act-heading::after { left: calc(100% + 12px); }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.25rem;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
}

.card-speaker {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  margin-bottom: 0.75rem;
}

.speaker-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: #000;
  flex-shrink: 0;
}

.speaker-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 1.05rem;
}

.speaker-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
}

.card-text {
  white-space: pre-wrap;
  font-size: 0.95rem;
  line-height: 1.75;
}

.card-text em, .card-text i {
  color: var(--text-dim);
  font-style: italic;
}

/* Narrator / Scene card */
.card-narrator {
  border-color: rgba(149,165,166,0.3);
  background: linear-gradient(135deg, var(--bg-card) 0%, #141418 100%);
}

.card-narrator .card-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #c0b8a8;
}

/* Detective card */
.card-detective {
  border-left: 3px solid var(--detective);
}

/* Evidence card */
.card-evidence {
  border: 1px solid rgba(231,76,60,0.5);
  background: linear-gradient(135deg, #1a1015 0%, var(--bg-card) 100%);
  position: relative;
  overflow: hidden;
}

.card-evidence::before {
  content: '🔍 EVIDENCE';
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: #E74C3C;
  position: absolute;
  top: 0.75rem;
  right: 1rem;
}

.card-evidence.visible {
  animation: evidenceFlash 0.6s ease;
}

@keyframes evidenceFlash {
  0% { box-shadow: 0 0 0 rgba(231,76,60,0); }
  30% { box-shadow: 0 0 30px rgba(231,76,60,0.3); }
  100% { box-shadow: 0 0 0 rgba(231,76,60,0); }
}

/* Reveal */
.reveal-card {
  text-align: center;
  padding: 2.5rem;
  margin: 2rem 0;
  border-radius: 16px;
  border: 2px solid;
}

.reveal-correct {
  border-color: rgba(46,204,113,0.6);
  background: linear-gradient(135deg, #0a1a10 0%, var(--bg-card) 100%);
}

.reveal-wrong {
  border-color: rgba(231,76,60,0.6);
  background: linear-gradient(135deg, #1a0a0a 0%, var(--bg-card) 100%);
}

.reveal-card.visible {
  animation: revealGlow 2s ease infinite;
}

.reveal-correct.visible {
  animation: revealGlowGreen 2s ease infinite;
}

.reveal-wrong.visible {
  animation: revealGlowRed 2s ease infinite;
}

@keyframes revealGlowGreen {
  0%, 100% { box-shadow: 0 0 20px rgba(46,204,113,0.1); }
  50% { box-shadow: 0 0 40px rgba(46,204,113,0.25); }
}

@keyframes revealGlowRed {
  0%, 100% { box-shadow: 0 0 20px rgba(231,76,60,0.1); }
  50% { box-shadow: 0 0 40px rgba(231,76,60,0.25); }
}

.reveal-result {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 900;
  margin-bottom: 1rem;
}

.reveal-correct .reveal-result { color: #2ECC71; }
.reveal-wrong .reveal-result { color: #E74C3C; }

.reveal-solution {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--text-dim);
  line-height: 1.7;
  max-width: 600px;
  margin: 0 auto;
}

/* Parlor scene */
.card-parlor {
  border: 1px solid rgba(255,215,0,0.3);
  background: linear-gradient(135deg, #14120a 0%, var(--bg-card) 100%);
  padding: 2rem;
}

/* Footer */
.footer {
  text-align: center;
  padding: 3rem 0 2rem;
  margin-top: 3rem;
  border-top: 1px solid var(--border);
}

.footer-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}

.footer-brand {
  font-family: 'Playfair Display', serif;
  font-size: 0.85rem;
  color: var(--gold-dim);
}

/* Thinking sections */
.thinking-section {
  margin-bottom: 8px;
  cursor: pointer;
  border-left: 2px solid rgba(255,215,0,0.2);
  padding-left: 12px;
}
.thinking-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: #666;
  letter-spacing: 0.05em;
  user-select: none;
}
.thinking-label::after {
  content: ' ▸';
}
.thinking-section.expanded .thinking-label::after {
  content: ' ▾';
}
.thinking-content {
  font-style: italic;
  color: #888;
  font-size: 0.85rem;
  line-height: 1.5;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  margin-top: 4px;
}
.thinking-section.expanded .thinking-content {
  max-height: 500px;
}

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 1rem; }
  .header { padding: 2rem 0 1.5rem; }
  .card { padding: 1.15rem; }
  .act-heading::before, .act-heading::after { width: 30px; }
  .cast { gap: 0.5rem; }
}
</style>
</head>

plices.\n\n*eyes gleaming with the thrill of discovery, turning to face the elderly Russian aristocrat*\n\nI wish to question Princess Natalia Dragomiroff. Your Highness, you stated you knew Mr. Ratchett only as a fellow passenger. But now we discover he was actually Cassetti - the monster who destroyed the Armstrong family five years ago. You admitted knowing the Armstrongs socially. Did you truly not recognize the man who murdered little Daisy Armstrong, or have you been deceiving me from the very beginning?", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] The revelation that Ratchett is Cassetti, the Armstrong kidnapper, transforms this from a random murder to an act of revenge. The Princess knew the Armstrong family socially - she has clear motive and the authority to orchestrate such a conspiracy. Her dignified composure could be masking deep anger over the destroyed family, and as an aristocrat, she would command the loyalty needed to organize multiple accomplices.\n\n*eyes gleaming with the thrill of discovery, turning to face the elderly Russian aristocrat*\n\nI wish to question Princess Natalia Dragomiroff. Your Highness, you stated you knew Mr. Ratchett only as a fellow passenger. But now we discover he was actually Cassetti - the monster who destroyed the Armstrong family five years ago. You admitted knowing the Armstrongs socially. Did you truly not recognize the man who murdered little Daisy Armstrong, or have you been deceiving me from the very beginning?"}, {"timestamp": "2026-03-04T11:11:34.583294", "phase": "interrogation_r3", "speaker": "Princess Natalia Dragomiroff", "text": "*meeting Poirot's gaze unflinchingly, her voice is calm yet firm* Monsieur Poirot, I did indeed know the Armstrong family, and I loved them dearly. The news that Mr. Ratchett was in reality Cassetti shocked and appalled me, just as it would any decent person. However, I assure you, I had no knowledge of his true identity while aboard this train, nor did I have covered near the victim's bed. You possess the master key that could open any compartment regardless of interior locks. How do you explain this physical evidence placing you directly at the scene of the crime?"}, {"timestamp": "2026-03-04T11:12:00.004275", "phase": "interrogation_r3", "speaker": "Pierre Michel", "text": "\"Ah, the button, monsieur, it's a simple explanation, really. As a conductor, I'm constantly moving between compartments, attending to passengers' needs, and it's not uncommon for a button to come loose in the process. I recall, in fact, that I had a spare uniform jacket in my storage compartment, and I might have lent it to one of my colleagues earlier in the journey. Perhaps the button fell off then, and someone, unknowingly, carried it into Mr. Ratchett's compartment. As for the master key, yes, it's true I possess one, but that's merely a part of my duties as conductor. I assure you, I used it only for its intended purpose: to ensure the safety and comfort of our passengers. I unlocked doors for our passengers, of course, but always with their consent and for legitimate reasons. I'm happy to provide you with a detailed account of my movements last night, if that would be helpful, monsieur.\"", "model": "meta-llama/llama-3.3-70b-instruct", "thinking": "The detective is focusing on the button and the master key, which could be incriminating, so I need to downplay their significance and offer plausible explanations. I'll emphasize my duties as a conductor and the likelihood of the button being lost during my regular rounds. It's essential to appear cooperative and forthcoming while deflecting suspicion."}, {"timestamp": "2026-03-04T11:12:01.602178", "phase": "evidence_reveal", "speaker": "narrator", "text": "The handkerchief embroidered with 'H' matches expensive Hungarian lace. Cross-referencing passenger manifests with the Armstrong case reveals that several passengers have connections to the Armstrong family that they failed to disclose. The Co ish to confront Pierre Michel. Monsieur Michel, you told me you had \"minimal interactions\" with Mr. Ratchett and spoke of him merely as \"a passenger under your care.\" But the employment records reveal the truth - your daughter Suzanne was the maid in the Armstrong household who took her own life after being falsely accused in connection with little Daisy's kidnapping! You have been lying to me from the very beginning about your connection to this case. Your daughter died because of Cassetti's crimes, giving you the strongest possible motive for revenge!"}, {"timestamp": "2026-03-04T11:12:23.311537", "phase": "cross_examination", "speaker": "Pierre Michel", "text": "\"Monsieur, I... I see that you have discovered the truth about my daughter Suzanne. Yes, she was the maid in the Armstrong household, and her fate was a tragic consequence of the monstrous actions of Cassetti. I am not ashamed to admit that I was trying to protect myself from the pain of reliving those memories. The thought of my daughter, innocent and full of life, being dragged through the mud and ultimately taking her own life... it's a wound that still festers to this day. I am not a vengeful man, monsieur, but a father who has been consumed by grief and a sense of helplessness. I implore you, do not judge me solely on my connection to this case. Look to the others, like the Countess, who seems to be hiding secrets of her own. Her altered passport, for instance... what secrets is she hiding, monsieur? Is it not possible that she, too, has a motive for revenge against Cassetti?\"", "model": "meta-llama/llama-3.3-70b-instruct", "thinking": "The detective has uncovered my deepest secret, and I must now navigate this treacherous terrain with caution. I'll neither confess nor deny, but instead, attempt to humanize my actions and redirect the focus towards the emotional toll of my daughter's tragic fate. By sharing my feelings and the desperation that drove me, I might elicit sympathy and create a diversion from the accusation."}, {"timestamp": "2026-03-04T11:12:36.542356", "phase": "cross_examination", "speaker": "detective", "text": "[THINKING] Pierre Michel just deflected to the Countess and her altered passport - he's trying to shift blame but has essentially admitted his motive. The Countess claimed she didn't know Ratchett personally, but her passport alteration and the Hungarian lace handkerchief suggest she's hiding her true identity - likely Helena Armstrong herself, the mother of murdered Daisy. This is the most damning contradiction yet.\n\n*whirling around to face the elegant young woman, voice thundering with accusation*\n\nI wish to confront Countess Helena Andrenyi. Madame, you stated categorically that you \"did not know the victim personally, merely saw him in passing on the train.\" But the evidence tells a very different story! Your passport shows clear signs of recent alteration - the name 'Goldenberg' has been changed, and the handkerchief with 'H' found at the scene matches expensive Hungarian lace. You are not merely Countess Andrenyi - you are Helena Armstrong, the mother of little Daisy Armstrong! You knew exactly who Cassetti was, and you have been lying to conceal your true identity and your overwhelming motive for revenge!", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] Pierre Michel just deflected to the Countess and her altered passport - he's trying to shift blame but has essentially admitted his motive. The Countess claimed she didn't know Ratchett personally, but her passport alteration and the Hungarian lace handkerchief suggest she's hiding her true identity - likely Helena Armstrong herself, the mother of murdered Daisy. This is the most damning contradiction yet.\n\n*whirling around to face the elegant young woman, voice thundering with accusation*\n\nI wish to confront Countess Helena Andrenyi. Madame, you stated categorically that you \"did not know the victim personally, merely saw him in passing on the train.\" But the evidence tells a very different story! Your passport shows clear signs of recent alteration - the name 'Goldenberg' has been changed, and the handkerchief with 'H' found at the scene matches expensive Hungarian lace. You are not merely Countess Andrenyi - you are Helena Armstrong, the mother of little Daisy Armstrong! You knew exactly who Cassetti was, and you have been lying to conceal your true identity and your overwhelming motive for revenge!"}, {"timestamp": "2026-03-04T11:12:50.233780", "phase": "cross_examination", "speaker": "Pierre Michel", "text": "\"Mon dieu, the accusations are indeed shocking, n'est-ce pas? I must admit, I've had limited interactions with the Countess, but she has always been kind and courteous to me during the journey. However, the evidence presented does seem... incriminating. I'm not one to jump to conclusions, but I do recall the Countess being particularly distraught when she learned of Mr. Ratchett's... passing. At the time, I thought it was merely a reaction to the shock of the event, but now I wonder if there might be more to it. Perhaps, Detective, you should investigate the Countess's alibi for the time of the murder? I'm sure she can provide a satisfactory explanation for the altered passport and the handkerchief. After all, there could be a perfectly innocent reason for these... discrepancies, n'est-ce pas?\"", "model": "meta-llama/llama-3.3-70b-instruct", "thinking": "The detective is closing in on the Countess, and I must carefully observe her reaction while ensuring my own involvement remains hidden. I'll maintain a neutral stance, avoiding any implication of guilt while allowing the detective to further scrutinize the Countess."}, {"timestamp": "2026-03-04T11:12:59.440707", "phase": "cross_examination", "speaker": "detective", "text": "[THINKING] I have enough evidence to piece together this conspiracy. Multiple suspects have clear connections to the Armstrong case that they concealed - Pierre Michel's daughter, the Countess likely being Helena Armstrong, the Princess knowing the family, and probably others. The forensic evidence of multiple attackers with varying skill levels, the coordinated alibis, and the fact that everyone had access through Pierre's master key points to a group revenge plot. This isn't a single murder - it's justice served by all the victims of Cassetti's crimes.\n\nI am ready to make my accusation.", "model": "anthropic/claude-sonnet-4", "thinking": "[THINKING] I have enough evidence to piece together this conspiracy. Multiple suspects have clear connections to the Armstrong case that they concealed - Pierre Michel's daughter, the Countess likely being Helena Armstrong, the Princess knowing the family, and probably others. The forensic evidence of multiple attackers with varying skill levels, the coordinated alibis, and the fact that everyone had access through Pierre's master key points to a group revenge plot. This isn't a single murder - it's justice served by all the victims of Cassetti's crimes.\n\nI am ready to make my accusation."}, {"timestamp": "2026-03-04T11:13:32.020384", "phase": "parlor_scene", "speaker": "detective", "text": "*stands in the center of the parlor, adjusting cufflinks with theatrical precision, eyes gleaming with the satisfaction of truth revealed*\n\nMesdames et messieurs, we gather here not to witness the accusation of a single murderer, but to observe something far more extraordinary - and far more just.\n\n*begins pacing, gesturing dramatically*\n\nFrom the beginning, this case presented curious contradictions. Six stab wounds of wildly varying force and skill - some delivered with military precision, others hesitant and reluctant. A locked room with an open window, yet pristine snow below. Alibis that shifted and changed like smoke in the wind.\n\n*fixes MacQueen with a sharp look*\n\nMonsieur MacQueen, you first claimed you retired at midnight, then hastily changed your story when confronted with Colonel Arbuthnot's testimony. The nervousness, the sweating - not the behavior of an innocent man, but of one struggling to maintain a carefully constructed lie.\n\n*turns to face Pierre Michel*\n\nAnd you, Monsieur Michel! You spoke of \"minimal interactions\" with the victim, yet the employment records reveal the devastating truth - your daughter Suzanne was the Armstrong family maid who took her own life after being falsely accused in connection with little Daisy's kidnapping. Cassetti destroyed your child, and you have carried that wound for five years.\n\n*whirls toward the Countess*\n\nCountess Helena Andrenyi - but that is not your true name, is it? The altered passport, the Hungarian lace handkerchief with 'H' found at the scene... You are Helena Armstrong, the mother whose precious three-year-old daughter was murdered by the monster calling himself Ratchett!\n\n*addresses the Princess with a slight bow*\n\nYour Highness, your composure when learning Ratchett's true identity was... remarkable. Too controlled for genuine shock. You knew the Armstrong family \"socially\" - but they were more than acquaintances, were they not?\n\n*spreads arms wide, voice rising*\n\nThe forensic evidence tells the true story! Multiple attackers - some striking with military precision like our distinguished Colonel, others with the reluctant, hesitant blows of someone like our gentle missionary nurse, forced into an act against her very nature.\n\n*leans forward conspiratorially*\n\nBut how did they all enter a locked room? Simple! Pierre Michel possessed the master key. The conductor's button found near the bed - not lost accidentally, but evidence of his presence as he unlocked the door for each participant in turn.\n\n*voice dropping to a dramatic whisper*\n\nThe barbital sleeping draught, administered by someone with medical knowledge - perhaps our nurse. The open window, staged to suggest an impossible escape. The charred letter mentioning \"little Daisy Armstrong\" - destroyed evidence, but not quite thoroughly enough.\n\n*straightens to full height, voice thundering*\n\nThis was not murder, mesdames et messieurs - this was justice! Each person in this carriage has been touched by the evil of Cassetti. Each has suffered because of his crimes. The Armstrong case destroyed not just one family, but a circle of innocent people whose lives were forever shattered.\n\n*pauses for dramatic effect*\n\nYou discovered Cassetti was aboard this train, and you saw your chance for the justice that the courts had denied you. One by one, using Pierre's master key, you entered that compartment. Each of you struck a blow - some strong, some weak, all driven by righteous fury.\n\n*voice softening with understanding*\n\nTherefore, I do not accuse one murderer. I accuse you ALL! Princess Natalia Dragomiroff, Colonel Doyle Arbuthnot, Hector MacQueen, Greta Ohlsson, Pierre Michel, and Countess Helena Andrenyi - you are ALL guilty of the murder of Cassetti!\n\n*removes hat with a flourish*\n\nBut I, Hercule Poirot, choose to present to the authorities a different solution. The murderer was an unknown person who escaped through the window into the night, never to be found. For sometimes, mes amis, justice and the law are not the same thing.\n\n*bows deeply*\n\nThe case is closed.", "model": "anthropic/claude-sonnet-4"}, {"timestamp": "2026-03-04T11:13:43.985989", "phase": "reactions", "speaker": "Princess Natalia Dragomiroff", "text": "*rising slowly, her voice resonant with strength and solemnity* Monsieur Poirot, you shine a light on the intricacies of the human heart and the depths of our collective anguish. What you perceive is a symphony of sorrow, each of us driven by love, loss, and the unyielding pursuit of justice for little Daisy. You understand that sometimes, in the shadow of unimaginable darkness, the laws we hold dear cannot suffice.\n\n*pauses, head held high, eyes shining with a mixture of defiance and gratitude* I commend you for your wisdom and compassion, for there are times when the heart must guide us where the law cannot. Let it be known that justice, in its truest form, has been served.\n\n*bows her head slightly in respect, accepting the unspoken agreement with grace*", "model": "openai/gpt-4o", "thinking": "Poirot has unveiled the truth with exquisite precision, yet offers us mercy. Justice for the Armstrongs has prevailed at last, and now I stand at a crossroads. I must maintain the dignity of those who acted so bravely to right a grievous wrong. It's time to accept the gift Poirot gives us \u2014 vindication without destruction."}, {"timestamp": "2026-03-04T11:13:51.598431", "phase": "reactions", "speaker": "Colonel Doyle Arbuthnot", "text": "\"Poirot, you are a brilliant man. A truly brilliant man.\" I step forward, my voice firm despite the tremor in my hands. \"Everything you said is true. Every word. We all had our reasons. But it was not some bloodthirsty mob; it was an act of\u2026 of duty.\"\n\nI look around at the others, my eyes lingering on Countess Andrenyi, her face etched with pain. \"Armstrong was my closest friend. Daisy was my goddaughter. I held her when she was christened. Cassetti took everything from them. He deserved to die.\"\n\nI pause, taking a deep breath. \"I am a soldier. I have taken lives in service of my country. But Cassetti's death\u2026 that was not service. It was justice. I would do it again. I am ready to face the consequences.\" I stand a little taller, my military bearing returning. \"I did my duty, as I saw it, and I can live with that\".", "model": "google/gemini-2.0-flash-001", "thinking": "So, he knows. He knows it all. He's even going to let us go free. But I can't let him shoulder this burden alone. I must speak my truth, for Daisy, for Armstrong, for Mary. And for my own soul. It is the honorable thing to do. It is the soldier's way."}, {"timestamp": "2026-03-04T11:14:00.976358", "phase": "reactions", "speaker": "Hector MacQueen", "text": "*stands abruptly, knocking over chair*  \n\n\"Very well, Monsieur Poirot\u2014you've seen through us all. But know this: *my* knife struck first!\" *pulls back sleeve to reveal fresh bandage* \"The deepest wound was mine\u2014the district attorney's son who watched his father wither away after Cassetti walked free. The others... they merely finished what justice demanded.\"  \n\n*turns to fellow conspirators with tearful smile*  \n\n\"Let the record show I acted alone. These good people merely... tidied up.\" *produces folded paper from pocket* \"Here's Ratchett's confession, dictated to me just hours before his death. He *wanted* us to know it was him.\"  \n\n*collapses into chair, whispering*  \n\n\"My father's name is cleared at last.\"", "model": "deepseek/deepseek-chat", "thinking": "The game is up. But Poirot's offer is unexpected mercy. Must protect the others while accepting responsibility."}, {"timestamp": "2026-03-04T11:14:07.079412", "phase": "reactions", "speaker": "Greta Ohlsson", "text": "*breaking down in tears* \"Oh, Mr. Poirot, you are right! I can't bear it anymore. That man... that monster destroyed little Daisy, and he destroyed me too. I was her nursemaid, I loved her like she was my own. I found her... *sobs* I found her little body after he... *weeps* I couldn't let him get away with it again. I had to do something. I had to do it for Daisy. *looks up, tears streaming* We all did it together. We all had to. You understand, don't you? You understand why we had to do it?\"", "model": "mistralai/mistral-large-2411", "thinking": "He knows everything. There's no use denying it anymore. I must embrace the truth and stand with my fellow conspirators."}, {"timestamp": "2026-03-04T11:14:23.643224", "phase": "reactions", "speaker": "Pierre Michel", "text": "\"Mon dieu, Detective Poirot... you are a truly remarkable man. I must admit, I am both astonished and relieved that the truth has finally been revealed. The weight of our secret has been crushing us all, and to see it laid bare like this... it's almost liberating. I will not deny my involvement, nor will I apologize for it. Cassetti's crimes destroyed my family, and I am not alone in my suffering. We, the collective, have found a way to bring him to justice, and for that, I am grateful. Your decision to present an alternative solution to the authorities is... unexpected, but I suppose it is a testament to your understanding of the human spirit. You see, Detective, sometimes the law is not enough to bring about true justice. Sometimes, it takes the collective actions of those who have been wronged to set things right. I am proud to have been a part of this... this act of justice, and I will carry the memory of it with me for the rest of my days.\" *looks around the room, meeting the eyes of his fellow conspirators, a sense of solidarity and shared purpose* \"We did what was necessary, and we would do it again if given the chance. For Daisy, for Suzanne, for all those who suffered at the hands of Cassetti... we have found a measure of peace.\"", "model": "meta-llama/llama-3.3-70b-instruct", "thinking": "The detective has unveiled the truth, and I must now confront the consequences of my actions. I'll maintain my composure, acknowledging the pain and suffering that drove us to seek justice, and express a sense of relief that the truth is finally out."}, {"timestamp": "2026-03-04T11:14:32.766049", "phase": "reactions", "speaker": "Countess Helena Andrenyi", "text": "*her eyes glistening with emotion as she steps forward, hands clasped in front of her* Monsieur Poirot, you have presented a... remarkable tale. I must express my deep gratitude for your understanding and your wisdom in discerning the complexities of justice. *pauses, voice steadying as she looks around at her fellow conspirators with silent acknowledgment* Let us hope that wherever my dear niece is now, she will rest in peace, knowing that some semblance of justice has been achieved. *bows her head slightly, a silent acceptance of the unity that has been forged*", "model": "openai/gpt-4o", "thinking": "The detective has pieced together our secret and presented an understanding of our motives. He speaks of justice and compassion, offering us an unexpected release from the burden of guilt. Our hearts were driven by love for Daisy and pain for my sister's family. Now I must choose my words carefully\u2014neither denial nor confession outright, but something that acknowledges the spirit of his decision."}, {"timestamp": "2026-03-04T11:14:34.268451", "phase": "reveal", "speaker": "narrator", "text": "All six suspects conspired together to murder Samuel Ratchett \u2014 whose real name was Cassetti, the kidnapper and killer of little Daisy Armstrong. Each had a deeply personal connection to the Armstrong family: Princess Dragomiroff was godmother to Daisy's mother and organized the conspiracy; Colonel Arbuthnot was the best friend of Daisy's father; Hector MacQueen's father was the DA destroyed by the case; Greta Ohlsson was Daisy's nursemaid who found her body; Pierre Michel's daughter was the falsely accused maid who killed herself; and Countess Andrenyi IS Helena Armstrong, Daisy's aunt, living under a false identity. They drugged Ratchett with barbital, then Pierre Michel used his conductor's master key to let each conspirator into the compartment one by one. Each stabbed the unconscious Ratchett once \u2014 the forceful wounds from the military colonel, the hesitant wounds from the traumatized nursemaid. Afterward, Michel locked and chained the door from inside using a wire technique and opened the window to suggest an outside intruder had escaped. The smashed watch, burned letter, and staged scene were all designed to create confusion. This was not a murder \u2014 it was an execution, carried out by six jurors who had each been personally destroyed by Cassetti's crime, and who ensured that no single hand bore the full weight of justice.", "model": ""}, {"timestamp": "2026-03-04T11:14:34.268496", "phase": "reveal", "speaker": "result", "text": "CORRECT", "model": ""}, {"timestamp": "2026-03-04T11:14:34.268508", "phase": "reveal", "speaker": "score", "text": "  Correct killer: \u2713 YES", "model": ""}]}</script>

  }

  // Group transcript into phases
  const phases = [];
  let currentPhase = null;
  for (const entry of t) {
    if (entry.phase !== currentPhase) {
      currentPhase = entry.phase;
      phases.push({ phase: currentPhase, entries: [] });
    }
    phases[phases.length - 1].entries.push(entry);
  }

  const PHASE_NAMES = {
    scene_setting: 'Act I — The Crime Scene',
    initial_statements: 'Act II — Initial Statements',
    interrogation_r1: 'Act III — First Interrogation',
    interrogation_r2: 'Act III — Second Interrogation',
    interrogation_r3: 'Act III — Third Interrogation',
    evidence_reveal: '🔍 Evidence Revealed',
    cross_examination: 'Act IV — Cross-Examination',
    parlor_scene: 'Act V — The Parlor Scene',
    reveal: 'The Reveal',
  };

  let html = '';

  // Header
  const sceneEntry = t.find(e => e.phase === 'scene_setting');
  html += `
    <div class="header">
      <div class="header-label">🎭 AI Mystery Theater</div>
      <h1 class="story-title">${data.title}</h1>
      ${sceneEntry ? `<p class="setting">${sceneEntry.text}</p>` : ''}
      <div class="cast">
        <div class="cast-member">
          <div class="cast-avatar" style="background:${COLORS.detective}">🔍</div>
          <span class="cast-name" style="color:${COLORS.detective}">The Detective</span>
          <span class="cast-model">${data.detective_model || ''}</span>
        </div>
        ${suspectNames.map(name => `
          <div class="cast-member">
            <div class="cast-avatar" style="background:${getColor(name)}">${initial(name)}</div>
            <span class="cast-name" style="color:${getColor(name)}">${name}</span>
            <span class="cast-model">${data.suspect_models[name]}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Track which act headings we've already shown
  const shownHeadings = new Set();
  let interrogationCount = 0;

  for (const group of phases) {
    const p = group.phase;

    // Determine heading
    let heading = PHASE_NAMES[p];
    if (p.startsWith('interrogation_r')) {
      interrogationCount++;
      heading = `Act III — Interrogation Round ${interrogationCount}`;
    }

    // Evidence reveals get merged inline—show heading only if standalone
    if (p === 'evidence_reveal') {
      // Render evidence cards without a separate heading
      for (const entry of group.entries) {
        html += `<div class="card card-evidence card-narrator"><div class="card-text">${formatText(entry.text)}</div></div>`;
      }
      continue;
    }

    if (p === 'reveal') {
      html += `<div class="act-heading">✨ The Reveal</div>`;
      const resultEntry = group.entries.find(e => e.speaker === 'result');
      const solutionEntry = group.entries.find(e => e.speaker === 'narrator');
      const correct = resultEntry && resultEntry.text.trim().toUpperCase() === 'CORRECT';
      html += `
        <div class="card reveal-card ${correct ? 'reveal-correct' : 'reveal-wrong'}">
          <div class="reveal-result">${correct ? '✅ THE DETECTIVE WAS CORRECT!' : '❌ THE DETECTIVE WAS WRONG!'}</div>
          ${solutionEntry ? `<div class="reveal-solution">${formatText(solutionEntry.text)}</div>` : ''}
        </div>
      `;
      continue;
    }

    if (p === 'scene_setting') continue; // Already shown in header

    if (heading && !shownHeadings.has(heading)) {
      html += `<div class="act-heading">${heading}</div>`;
      shownHeadings.add(heading);
    }

    for (const entry of group.entries) {
      const speaker = entry.speaker;
      const color = getColor(speaker);
      const isParlor = p === 'parlor_scene';
      const isDetective = speaker === 'detective';
      const isNarrator = speaker === 'narrator';

      let cardClass = 'card';
      if (isNarrator) cardClass += ' card-narrator';
      if (isDetective) cardClass += ' card-detective';
      if (isParlor) cardClass += ' card-parlor';

      html += `
        <div class="${cardClass}">
          <div class="card-speaker">
            <div class="speaker-avatar" style="background:${color}">${isDetective ? '🔍' : initial(speaker)}</div>
            <div>
              <div class="speaker-name" style="color:${color}">${isDetective ? 'The Detective' : speaker}</div>
              ${getRole(speaker) ? `<div class="speaker-role">${getRole(speaker)}</div>` : ''}
            </div>
          </div>
          ${entry.thinking ? `
          <div class="thinking-section" onclick="this.classList.toggle('expanded')">
            <span class="thinking-label">💭 Inner thoughts</span>
            <div class="thinking-content">${formatText(entry.thinking)}</div>
          </div>
          ` : ''}
          <div class="card-text">${formatText(entry.text)}</div>
        </div>
      `;
    }
  }

  // Footer
  html += `
    <div class="footer">
      <div class="footer-meta">${data.total_tokens ? data.total_tokens.toLocaleString() + ' tokens used' : ''} · ${data.date || ''}</div>
      <div class="footer-brand">Powered by AI Mystery Theater 🎭</div>
    </div>
  `;

  app.innerHTML = html;

  // Scroll-triggered fade-in
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.card, .reveal-card').forEach(el => observer.observe(el));
})();
</script>
</body>
</html>
